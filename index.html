<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Common Cents — Accounting</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
.sidebar { width: 220px; background: #1e293b; color: #94a3b8; display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.2s ease; overflow: hidden; }
.sidebar.collapsed { width: 52px; }
.sidebar-logo { padding: 20px 14px 16px; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.sidebar-logo span { color: #60a5fa; }
.sidebar-logo small { display: block; font-size: 10px; font-weight: 400; color: #64748b; letter-spacing: 0; margin-top: 2px; white-space: nowrap; }
.sidebar-logo-text { overflow: hidden; max-width: 180px; opacity: 1; transition: max-width 0.2s ease, opacity 0.15s; white-space: nowrap; }
.sidebar.collapsed .sidebar-logo-text { max-width: 0; opacity: 0; }
.sidebar-toggle { background: none; border: none; color: #64748b; cursor: pointer; font-size: 16px; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; line-height: 1; transition: color 0.15s; }
.sidebar-toggle:hover { color: #e2e8f0; }
.nav-section { padding: 16px 10px 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; white-space: nowrap; transition: opacity 0.15s; }
.sidebar.collapsed .nav-section { opacity: 0; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; border-radius: 8px; margin: 2px 8px; transition: all 0.15s; font-size: 14px; color: #94a3b8; white-space: nowrap; }
.nav-item:hover { background: #334155; color: #e2e8f0; }
.nav-item.active { background: #2563eb; color: #fff; }
.nav-icon { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-label { transition: opacity 0.15s; }
.sidebar.collapsed .nav-label { opacity: 0; }

/* ── Main ── */
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
.topbar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.topbar-title { font-size: 18px; font-weight: 700; }
.topbar-date { font-size: 13px; color: #64748b; }
.content { padding: 24px; flex: 1; }

/* ── Cards ── */
.card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; }
.stat-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 18px 20px; }
.stat-label { font-size: 12px; color: #64748b; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
.stat-value.green { color: #059669; }
.stat-value.red { color: #dc2626; }
.stat-value.amber { color: #d97706; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }

/* ── Section header ── */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.section-title { font-size: 15px; font-weight: 600; color: #1e293b; }
.section-sub { font-size: 13px; color: #64748b; margin-top: 2px; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead th { text-align: left; padding: 10px 14px; background: #f8fafc; color: #64748b; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
tbody td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fafc; }
.text-muted { color: #94a3b8; font-size: 12px; }
.text-mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }
.text-right { text-align: right; }
.fw-600 { font-weight: 600; }

/* ── Buttons ── */
.btn { padding: 8px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; line-height: 1; white-space: nowrap; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
.btn-secondary:hover { background: #e2e8f0; }
.btn-danger { background: #fee2e2; color: #dc2626; }
.btn-danger:hover { background: #fecaca; }
.btn-success { background: #d1fae5; color: #059669; }
.btn-success:hover { background: #a7f3d0; }
.btn-warning { background: #fef3c7; color: #92400e; }
.btn-warning:hover { background: #fde68a; }
.btn-ghost { background: transparent; color: #64748b; }
.btn-ghost:hover { background: #f1f5f9; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 5px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 4px; }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: capitalize; }
.badge-asset { background: #dbeafe; color: #1d4ed8; }
.badge-liability { background: #fee2e2; color: #dc2626; }
.badge-equity { background: #ede9fe; color: #7c3aed; }
.badge-revenue { background: #d1fae5; color: #059669; }
.badge-expense { background: #fef3c7; color: #92400e; }
.badge-income { background: #d1fae5; color: #059669; }
.badge-transfer { background: #e0e7ff; color: #4f46e5; }
.badge-draft { background: #f1f5f9; color: #64748b; }
.badge-sent { background: #dbeafe; color: #1d4ed8; }
.badge-paid { background: #d1fae5; color: #059669; }
.badge-overdue   { background: #fee2e2; color: #dc2626; }
.badge-accepted  { background: #d1fae5; color: #065f46; }
.badge-declined  { background: #fee2e2; color: #991b1b; }
.badge-expired   { background: #f1f5f9; color: #64748b; }
.badge-unpaid    { background: #fef3c7; color: #92400e; }
.badge-customer  { background: #dbeafe; color: #1e40af; }
.badge-vendor    { background: #f3e8ff; color: #6b21a8; }

/* ── Filter bar ── */
.filter-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; padding: 12px 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; }
.filter-input { height: 32px; padding: 0 10px; border: 1.5px solid #e2e8f0; border-radius: 6px; font-size: 13px; color: #1e293b; background: #fff; width: auto; }
.filter-input:focus { outline: none; border-color: #2563eb; }
.filter-search { min-width: 180px; }

/* ── Report tabs ── */
.report-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; }
.report-tab { padding: 6px 14px; border-radius: 6px; border: 1.5px solid #e2e8f0; background: #fff; font-size: 13px; font-weight: 500; color: #475569; cursor: pointer; transition: all 0.15s; }
.report-tab:hover { background: #f1f5f9; }
.report-tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }

/* ── Aging table ── */
.aging-bar { height: 6px; border-radius: 3px; background: #e2e8f0; margin-top: 4px; }
.aging-fill { height: 100%; border-radius: 3px; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(2px); }
.modal { background: #fff; border-radius: 14px; width: 580px; max-width: 95vw; max-height: 92vh; overflow-y: auto; box-shadow: 0 25px 80px rgba(0,0,0,0.25); }
.modal-lg { width: 740px; }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 1; border-radius: 14px 14px 0 0; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: #f1f5f9; border: none; cursor: pointer; font-size: 16px; width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #64748b; transition: all 0.15s; }
.modal-close:hover { background: #e2e8f0; color: #1e293b; }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid #f1f5f9; display: flex; gap: 8px; justify-content: flex-end; background: #f8fafc; border-radius: 0 0 14px 14px; }

/* ── Forms ── */
.form-group { margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }
label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
input[type=text], input[type=number], input[type=date], input[type=email], select, textarea {
  width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 7px; font-size: 14px; color: #1e293b; background: #fff; transition: border-color 0.15s, box-shadow 0.15s; font-family: inherit;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
input::placeholder { color: #94a3b8; }
textarea { resize: vertical; min-height: 70px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.form-hint { font-size: 11px; color: #94a3b8; margin-top: 4px; }

/* ── Invoice items ── */
.inv-items-table { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px; overflow: hidden; margin-top: 6px; }
.inv-items-table table { margin: 0; }
.inv-items-table input { border: none; border-radius: 0; padding: 8px 10px; }
.inv-items-table input:focus { box-shadow: none; border: none; background: #eff6ff; }
.inv-items-table td { padding: 4px 6px; border-bottom: 1px solid #f1f5f9; }
.inv-items-table tbody tr:last-child td { border-bottom: none; }
.inv-total-row { display: flex; justify-content: flex-end; gap: 16px; align-items: center; margin-top: 10px; font-size: 14px; }
.inv-total-row .total-label { color: #64748b; font-weight: 500; }
.inv-total-row .total-value { font-weight: 700; font-size: 18px; color: #1e293b; min-width: 100px; text-align: right; }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 52px 24px; }
.empty-icon { font-size: 44px; margin-bottom: 12px; opacity: 0.7; }
.empty-title { font-size: 15px; font-weight: 600; color: #475569; margin-bottom: 6px; }
.empty-text { font-size: 13px; color: #94a3b8; margin-bottom: 18px; }

/* ── Reports ── */
.report-section { margin-bottom: 24px; }
.report-section-title { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.07em; padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
.report-row { display: flex; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #f8fafc; font-size: 13.5px; }
.report-row:last-child { border-bottom: none; }
.report-row.total-row { background: #f8fafc; font-weight: 700; border-top: 2px solid #e2e8f0; }
.report-row.grand-total { background: #1e293b; color: #fff; font-weight: 700; font-size: 15px; }
.report-row.grand-total.green { background: #059669; }
.report-row.grand-total.red { background: #dc2626; }

/* ── Dashboard grid ── */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── Print ── */
@media print {
  .sidebar, .topbar, .btn, .section-header .btn { display: none !important; }
  .main { overflow: visible; }
  .content { padding: 0; }
}

/* ── Divider ── */
.divider { border: none; border-top: 1px solid #f1f5f9; margin: 16px 0; }

/* ── Receipt ── */
.receipt-upload { border: 2px dashed #e2e8f0; border-radius: 8px; padding: 14px 16px; text-align: center; cursor: pointer; transition: all 0.15s; background: #f8fafc; }
.receipt-upload:hover { border-color: #2563eb; background: #eff6ff; }
.receipt-upload input[type=file] { display: none; }
.receipt-upload-text { font-size: 13px; color: #64748b; }
.receipt-upload-text strong { color: #2563eb; }
.receipt-preview-thumb { max-width: 100%; max-height: 140px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 8px; display: none; object-fit: contain; }
.receipt-badge { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; background: #fef3c7; color: #92400e; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; }
.receipt-badge:hover { background: #fde68a; }
.receipt-modal-img { max-width: 100%; max-height: 65vh; border-radius: 8px; border: 1px solid #e2e8f0; display: block; margin: 0 auto; }

</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════ LOGIN -->
<div id="login-screen" style="position:fixed;inset:0;background:linear-gradient(135deg,#1e293b,#0f172a);display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div style="background:#fff;border-radius:16px;padding:40px 40px 32px;width:100%;max-width:380px;box-shadow:0 24px 64px rgba(0,0,0,.4);">
    <div style="font-size:22px;font-weight:800;color:#1e293b;margin-bottom:2px;">Common <span style="color:#2563eb;">Cents</span></div>
    <div style="font-size:13px;color:#64748b;margin-bottom:28px;">Sign in to your account</div>
    <div id="login-error" style="background:#fee2e2;color:#dc2626;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;"></div>

      <label>Username</label>
      <input type="text" id="login-user" placeholder="Enter username" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">

      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:8px;padding:10px;" onclick="login()">Sign In</button>
    <p style="text-align:center;margin-top:16px;font-size:11px;color:#94a3b8;">Default: <strong>admin</strong> / <strong>admin</strong></p>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════════

const DEFAULT_ACCOUNTS = [
  { id: 1,  code: '1001', name: 'Cash',              type: 'asset' },
  { id: 2,  code: '1002', name: 'Checking Account',  type: 'asset' },
  { id: 3,  code: '1003', name: 'Savings Account',   type: 'asset' },
  { id: 4,  code: '1100', name: 'Accounts Receivable', type: 'asset' },
  { id: 5,  code: '2001', name: 'Accounts Payable',  type: 'liability' },
  { id: 6,  code: '2100', name: 'Credit Card',       type: 'liability' },
  { id: 7,  code: '3001', name: "Owner's Equity",    type: 'equity' },
  { id: 8,  code: '3002', name: 'Retained Earnings', type: 'equity' },
  { id: 9,  code: '4001', name: 'Sales Revenue',     type: 'revenue' },
  { id: 10, code: '4002', name: 'Service Revenue',   type: 'revenue' },
  { id: 11, code: '5001', name: 'Rent Expense',      type: 'expense' },
  { id: 12, code: '5002', name: 'Office Expenses',   type: 'expense' },
  { id: 13, code: '5003', name: 'Utilities',         type: 'expense' },
  { id: 14, code: '5004', name: 'Salaries & Wages',  type: 'expense' },
  { id: 15, code: '5005', name: 'Marketing',         type: 'expense' },
];

let db = {
  accounts:     JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS)),
  transactions: [],
  invoices:     [],
  estimates:    [],
  bills:        [],
  contacts:     [],
  recurring:    [],
  projects:     [],
  bizInfo: { name: '', address: '', email: '', phone: '' },
  nextId: { account: 16, transaction: 1, invoice: 1, estimate: 1, bill: 1, contact: 1, recurring: 1, project: 1 }
};

function ensureDbFields() {
  if (!db.estimates)  db.estimates  = [];
  if (!db.bills)      db.bills      = [];
  if (!db.contacts)   db.contacts   = [];
  if (!db.recurring)  db.recurring  = [];
  if (!db.nextId.estimate)  db.nextId.estimate  = 1;
  if (!db.nextId.bill)      db.nextId.bill      = 1;
  if (!db.nextId.contact)   db.nextId.contact   = 1;
  if (!db.nextId.recurring) db.nextId.recurring = 1;
  if (!db.projects)         db.projects         = [];
  if (!db.nextId.project)   db.nextId.project   = 1;
}

// true when the app is being served by server.js (network mode)
let _serverMode = false;

// Cloud sync via GitHub Gist (credentials stored in localStorage only, never in code)
let _cloudMode          = false;
let _cloudPAT           = localStorage.getItem('cc_cloud_pat')     || '';
let _cloudGistId        = localStorage.getItem('cc_cloud_gist_id') || '';
let _lastCloudUpdatedAt = ''; // tracks gist updated_at to detect remote changes
let _lastSaveTime       = 0;  // ms timestamp of last local save, used to avoid overwriting a just-saved state
let _syncInterval       = null;

async function loadDB() {
  // ── 1. Cloud (GitHub Gist) — highest priority ────────────────
  if (_cloudPAT) {
    try {
      // Auto-discover gist if ID not cached on this device
      if (!_cloudGistId) {
        const ctrl = new AbortController();
        const t    = setTimeout(() => ctrl.abort(), 8000);
        const res  = await fetch('https://api.github.com/gists?per_page=100', {
          signal: ctrl.signal,
          headers: { 'Authorization': `Bearer ${_cloudPAT}`, 'Accept': 'application/vnd.github+json' }
        });
        clearTimeout(t);
        if (res.ok) {
          const list  = await res.json();
          const found = list.find(g => g.description === 'Common Cents Data' && g.files?.['data.json']);
          if (found) {
            _cloudGistId = found.id;
            localStorage.setItem('cc_cloud_gist_id', _cloudGistId);
          }
        }
      }

      if (_cloudGistId) {
        const ctrl = new AbortController();
        const t    = setTimeout(() => ctrl.abort(), 8000);
        const res  = await fetch(`https://api.github.com/gists/${_cloudGistId}`, {
          signal: ctrl.signal,
          headers: { 'Authorization': `Bearer ${_cloudPAT}`, 'Accept': 'application/vnd.github+json' }
        });
        clearTimeout(t);
        if (res.ok) {
          const gist = await res.json();
          const raw  = gist.files?.['data.json']?.content;
          if (raw) {
            db = JSON.parse(raw);
            ensureDbFields();
            _cloudMode = true;
            _lastCloudUpdatedAt = gist.updated_at || '';
            localStorage.setItem('cc_data_v2', raw); // local cache for offline fallback
            return;
          }
        }
      }
    } catch (_) { /* cloud unavailable — fall through */ }
  }

  // ── 2. Local network server ──────────────────────────────────
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 2000);
    const res = await fetch('/api/data', { signal: controller.signal });
    clearTimeout(timer);

    if (res.ok) {
      const data = await res.json();
      _serverMode = true;

      if (data && data.accounts && data.accounts.length > 0) {
        db = data;
        ensureDbFields();
        return;
      }

      // Server empty — migrate localStorage up to it
      try {
        const raw = localStorage.getItem('cc_data_v2');
        if (raw) {
          const local = JSON.parse(raw);
          if (local && local.accounts) { db = local; saveDB(); return; }
        }
      } catch (_) {}
      return;
    }
  } catch (_) { /* server not running */ }

  // ── 3. localStorage fallback ─────────────────────────────────
  try {
    const raw = localStorage.getItem('cc_data_v2');
    if (raw) { db = JSON.parse(raw); ensureDbFields(); }
  } catch (_) { /* keep defaults */ }
}

function saveDB() {
  const json = JSON.stringify(db);
  // Always write a local cache so the app works offline / after cloud errors
  localStorage.setItem('cc_data_v2', json);

  if (_cloudMode && _cloudPAT && _cloudGistId) {
    // Cloud sync — fire-and-forget (local cache already written above)
    _lastSaveTime = Date.now();
    fetch(`https://api.github.com/gists/${_cloudGistId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${_cloudPAT}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ files: { 'data.json': { content: json } } })
    }).catch(() => { /* silently ignore — local cache is the fallback */ });
  } else if (_serverMode) {
    fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: json
    }).catch(() => { /* local cache already written */ });
  }
}

function nextId(type) {
  const id = db.nextId[type];
  db.nextId[type]++;
  return id;
}

// UTILITIES
// ═══════════════════════════════════════════════════════════

const fmt = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n || 0);

function fmtDate(s) {
  if (!s) return '—';
  const [y, m, d] = s.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m-1]} ${+d}, ${y}`;
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function getAccount(id) {
  return db.accounts.find(a => a.id === +id);
}

// Balance rules:
//   income   → fromAccountId (revenue) ↑, toAccountId (asset) ↑
//   expense  → fromAccountId (expense) ↑, toAccountId (asset) ↓
//   transfer → fromAccountId (asset)   ↓, toAccountId (asset) ↑
function getBalance(accountId) {
  let bal = 0;
  const id = +accountId;
  for (const t of db.transactions) {
    if (t.type === 'income') {
      if (t.fromAccountId === id) bal += t.amount;  // revenue ↑
      if (t.toAccountId   === id) bal += t.amount;  // asset ↑
    } else if (t.type === 'expense') {
      if (t.fromAccountId === id) bal += t.amount;  // expense ↑
      if (t.toAccountId   === id) bal -= t.amount;  // asset ↓
    } else { // transfer
      if (t.fromAccountId === id) bal -= t.amount;
      if (t.toAccountId   === id) bal += t.amount;
    }
  }
  return bal;
}

function sumByType(...types) {
  return db.accounts
    .filter(a => types.includes(a.type))
    .reduce((s, a) => s + getBalance(a.id), 0);
}

const totalRevenue  = () => sumByType('revenue');
const totalExpenses = () => sumByType('expense');
const netIncome     = () => totalRevenue() - totalExpenses();
const totalAssets   = () => sumByType('asset');
const totalLiab     = () => sumByType('liability');
const totalEquity   = () => sumByType('equity');

function invSubtotal(inv) {
  return (inv.items || []).reduce((s, i) => s + (i.qty * i.rate), 0);
}
function invTaxAmt(inv) {
  return invSubtotal(inv) * ((inv.taxRate || 0) / 100);
}
function invTotal(inv) {
  return invSubtotal(inv) + invTaxAmt(inv);
}
function invPending() {
  return db.invoices.filter(i => ['draft','sent','overdue'].includes(i.status))
    .reduce((s, i) => s + invTotal(i), 0);
}
function invCollected() {
  return db.invoices.filter(i => i.status === 'paid').reduce((s, i) => s + invTotal(i), 0);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const ACCOUNT_TYPES = ['asset','liability','equity','revenue','expense'];
const TYPE_LABELS = { asset:'Asset', liability:'Liability', equity:'Equity', revenue:'Revenue', expense:'Expense' };
const TYPE_COLORS = { asset:'#1d4ed8', liability:'#dc2626', equity:'#7c3aed', revenue:'#059669', expense:'#d97706' };

function renderAccounts() {
  let html = `
    <div class="section-header">
      <div>
        <div class="section-title">Chart of Accounts</div>
        <div class="section-sub">${db.accounts.length} accounts</div>
      </div>
      <button class="btn btn-primary" onclick="showAddAccount()">+ Add Account</button>
    </div>
  `;

  for (const type of ACCOUNT_TYPES) {
    const accounts = db.accounts.filter(a => a.type === type).sort((a,b) => a.code.localeCompare(b.code));
    const typeTotal = accounts.reduce((s,a) => s + getBalance(a.id), 0);

    html += `<div class="card" style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="badge badge-${type}">${TYPE_LABELS[type]}s</span>
          <span style="font-size:12px;color:#64748b;">${accounts.length} account${accounts.length!==1?'s':''}</span>
        </div>
        <span class="fw-600" style="color:${TYPE_COLORS[type]}">${fmt(typeTotal)}</span>
      </div>
      ${accounts.length === 0
        ? `<p style="color:#94a3b8;font-size:13px;padding:8px 0;">No ${type} accounts. Add one above.</p>`
        : `<table>
          <thead><tr><th>Code</th><th>Account Name</th><th>Type</th><th class="text-right">Balance</th><th></th></tr></thead>
          <tbody>
            ${accounts.map(a => {
              const bal = getBalance(a.id);
              return `<tr>
                <td class="text-mono">${escHtml(a.code)}</td>
                <td class="fw-600">${escHtml(a.name)}</td>
                <td><span class="badge badge-${a.type}">${TYPE_LABELS[a.type]}</span></td>
                <td class="text-right fw-600">${fmt(bal)}</td>
                <td class="text-right">
                  <button class="btn btn-xs btn-danger" onclick="deleteAccount(${a.id})">Delete</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
    </div>`;
  }

  document.getElementById('main-content').innerHTML = html;
}

function showAddAccount() {
  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Add Account</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label>Account Code</label>
              <input type="text" id="f-code" placeholder="e.g. 1010">
            </div>
            <div class="form-group">
              <label>Account Type</label>
              <select id="f-type">
                <option value="asset">Asset</option>
                <option value="liability">Liability</option>
                <option value="equity">Equity</option>
                <option value="revenue">Revenue</option>
                <option value="expense">Expense</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Account Name</label>
            <input type="text" id="f-name" placeholder="e.g. Business Savings">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="addAccount()">Add Account</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('f-name').focus();
}

function addAccount() {
  const code = document.getElementById('f-code').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const type = document.getElementById('f-type').value;
  if (!code || !name) return alert('Please fill in all fields.');
  if (db.accounts.some(a => a.code === code)) return alert('Account code already exists.');
  db.accounts.push({ id: nextId('account'), code, name, type });
  saveDB();
  closeModal();
  renderAccounts();
}

function deleteAccount(id) {
  if (!canDelete()) return alert('Only administrators can delete records.');
  const used = db.transactions.some(t => t.fromAccountId === +id || t.toAccountId === +id);
  if (used) return alert('Cannot delete: this account has transactions.');
  if (!confirm('Delete this account? This cannot be undone.')) return;
  db.accounts = db.accounts.filter(a => a.id !== +id);
  saveDB();
  renderAccounts();
}

  `;

function renderTxTable() {
  let txns = [...db.transactions].sort((a,b) => b.date.localeCompare(a.date));

  if (_txFilter.search)   { const q = _txFilter.search.toLowerCase(); txns = txns.filter(t => t.description.toLowerCase().includes(q)); }
  if (_txFilter.type !== 'all') txns = txns.filter(t => t.type === _txFilter.type);
  if (_txFilter.dateFrom) txns = txns.filter(t => t.date >= _txFilter.dateFrom);
  if (_txFilter.dateTo)   txns = txns.filter(t => t.date <= _txFilter.dateTo);

  const countEl = document.getElementById('tx-count');
  if (countEl) countEl.textContent = `${txns.length} of ${db.transactions.length} records`;

  const wrap = document.getElementById('tx-table-wrap');
  if (!wrap) return;

  if (db.transactions.length === 0) {
    wrap.innerHTML = `<div class="empty-state">
      <div class="empty-icon">💸</div>
      <div class="empty-title">No transactions yet</div>
      <div class="empty-text">Record income, expenses, and account transfers.</div>
      <button class="btn btn-primary" onclick="showAddTransaction()">+ Add Transaction</button>
    </div>`;
    return;
  }
  if (txns.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">No matches</div><div class="empty-text">Try adjusting your filters.</div></div>`;
    return;
  }
  wrap.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th>Date</th><th>Description</th><th>Type</th><th>From</th><th>To</th><th class="text-right">Amount</th><th>Receipt</th><th></th></tr></thead>
    <tbody>
      ${txns.map(t => {
        const from  = getAccount(t.fromAccountId);
        const to    = getAccount(t.toAccountId);
        const color = t.type === 'income' ? '#059669' : t.type === 'expense' ? '#dc2626' : '#4f46e5';
        const receiptCell = t.receiptData
          ? `<button class="receipt-badge" onclick="viewReceipt(${t.id})">📎 View</button>`
          : `<button class="btn btn-xs btn-secondary" onclick="attachReceipt(${t.id})">+ Attach</button>`;
        return `<tr>
          <td class="text-muted" style="white-space:nowrap">${fmtDate(t.date)}</td>
          <td class="fw-600">${escHtml(t.description)}</td>
          <td><span class="badge badge-${t.type}">${t.type}</span></td>
          <td class="text-muted">${from ? escHtml(from.name) : '—'}</td>
          <td class="text-muted">${to   ? escHtml(to.name)   : '—'}</td>
          <td class="fw-600 text-right" style="color:${color}">${fmt(t.amount)}</td>
          <td>${receiptCell}</td>
          <td><button class="btn btn-xs btn-danger" onclick="deleteTransaction(${t.id})">Delete</button></td>
        </tr>`;
      }).join('')}
    </tbody>
  </table></div>`;
}

function buildAccountOptions(types) {
  return db.accounts
    .filter(a => !types || types.includes(a.type))
    .sort((a,b) => a.code.localeCompare(b.code))
    .map(a => `<option value="${a.id}">${a.code} — ${escHtml(a.name)}</option>`)
    .join('');
}

}

function txTypeChange() {
  const type = document.getElementById('t-type').value;
  const fromLabel = document.getElementById('t-from-label');
  const toLabel   = document.getElementById('t-to-label');
  const fromSel   = document.getElementById('t-from');
  const toSel     = document.getElementById('t-to');

  if (type === 'income') {
    fromLabel.textContent = 'Revenue Account';
    fromSel.innerHTML = buildAccountOptions(['revenue']);
    toLabel.textContent = 'Deposit To';
    toSel.innerHTML = buildAccountOptions(['asset']);
  } else if (type === 'expense') {
    fromLabel.textContent = 'Expense Category';
    fromSel.innerHTML = buildAccountOptions(['expense']);
    toLabel.textContent = 'Paid From';
    toSel.innerHTML = buildAccountOptions(['asset']);
  } else {
    fromLabel.textContent = 'Transfer From';
    fromSel.innerHTML = buildAccountOptions(['asset']);
    toLabel.textContent = 'Transfer To';
    toSel.innerHTML = buildAccountOptions(['asset']);
  }
}

function addTransaction() {
  if (!canEdit()) return alert('You do not have permission to add transactions.');
  const date   = document.getElementById('t-date').value;
  const type   = document.getElementById('t-type').value;
  const desc   = document.getElementById('t-desc').value.trim();
  const amount = parseFloat(document.getElementById('t-amount').value);
  const fromId = parseInt(document.getElementById('t-from').value);
  const toId   = parseInt(document.getElementById('t-to').value);

  if (!date || !desc) return alert('Please fill in date and description.');
  if (isNaN(amount) || amount <= 0) return alert('Please enter a valid amount.');
  if (type === 'transfer' && fromId === toId) return alert('Transfer accounts must be different.');

  const projId = parseInt(document.getElementById('t-project')?.value) || null;
  const txData = { id: nextId('transaction'), date, type, description: desc, amount, fromAccountId: fromId, toAccountId: toId, ...(projId ? { projectId: projId } : {}) };

  const fileInput = document.getElementById('t-receipt');
  const file = fileInput && fileInput.files[0];
  if (file) {
    if (file.size > 5 * 1024 * 1024) return alert('Receipt file is too large. Maximum size is 5 MB.');
    const reader = new FileReader();
    reader.onload = (e) => {
      txData.receiptData = e.target.result;
      txData.receiptName = file.name;
      txData.receiptType = file.type;
      db.transactions.push(txData);
      saveDB();
      closeModal();
      renderTransactions();
    };
    reader.readAsDataURL(file);
  } else {
    db.transactions.push(txData);
    saveDB();
    closeModal();
    renderTransactions();
  }
}

function deleteTransaction(id) {
  if (!canDelete()) return alert('Only administrators can delete records.');
  if (!confirm('Delete this transaction?')) return;
  db.transactions = db.transactions.filter(t => t.id !== +id);
  saveDB();
  renderTransactions();
}

function addInvItem() {
  _itemCount++;
  const n = _itemCount;
  const tbody = document.getElementById('inv-tbody');
  const tr = document.createElement('tr');
  tr.id = `inv-row-${n}`;
  tr.innerHTML = `
    <td><input type="text" id="inv-desc-${n}" placeholder="Service or product description"></td>
    <td><input type="number" id="inv-qty-${n}"  value="1"    min="0" step="any" style="width:100%" oninput="recalcInv()"></td>
    <td><input type="number" id="inv-rate-${n}" value=""     min="0" step="0.01" style="width:100%" placeholder="0.00" oninput="recalcInv()"></td>
    <td id="inv-line-${n}" style="padding:8px;font-weight:600;font-size:13px;">$0.00</td>
    <td style="padding:4px;text-align:center;"><button class="btn btn-xs btn-ghost" onclick="removeInvItem(${n})" title="Remove">✕</button></td>
  `;
  tbody.appendChild(tr);
}

function removeInvItem(n) {
  const row = document.getElementById(`inv-row-${n}`);
  if (row) row.remove();
  recalcInv();
}

function recalcInv() {
  let sub = 0;
  for (let i = 1; i <= _itemCount; i++) {
    const qtyEl  = document.getElementById(`inv-qty-${i}`);
    const rateEl = document.getElementById(`inv-rate-${i}`);
    const lineEl = document.getElementById(`inv-line-${i}`);
    if (!qtyEl || !rateEl || !lineEl) continue;
    const line = (parseFloat(qtyEl.value)||0) * (parseFloat(rateEl.value)||0);
    lineEl.textContent = fmt(line);
    sub += line;
  }
  const taxRate = parseFloat(document.getElementById('i-taxrate')?.value) || 0;
  const taxAmt  = sub * (taxRate / 100);
  const el = document.getElementById('inv-subtotal'); if (el) el.textContent = fmt(sub);
  const ta = document.getElementById('inv-tax-amt');  if (ta) ta.textContent = fmt(taxAmt);
  const gt = document.getElementById('inv-grand-total'); if (gt) gt.textContent = fmt(sub + taxAmt);
}

function getInvItems() {
  const items = [];
  for (let i = 1; i <= _itemCount; i++) {
    const descEl = document.getElementById(`inv-desc-${i}`);
    const qtyEl  = document.getElementById(`inv-qty-${i}`);
    const rateEl = document.getElementById(`inv-rate-${i}`);
    if (!descEl) continue;
    const desc = descEl.value.trim();
    const qty  = parseFloat(qtyEl.value)  || 0;
    const rate = parseFloat(rateEl.value) || 0;
    if (desc) items.push({ desc, qty, rate });
  }
  return items;
}

function saveInvoice() {
  if (!canEdit()) return alert('You do not have permission to save invoices.');

  const date   = document.getElementById('i-date').value;
  const due    = document.getElementById('i-due').value;
  const notes   = document.getElementById('i-notes').value.trim();
  const taxRate = parseFloat(document.getElementById('i-taxrate')?.value) || 0;
  const projId  = parseInt(document.getElementById('i-project')?.value) || null;
  const items   = getInvItems();

  if (!client) return alert('Please enter a client name.');
  if (!date)   return alert('Please select an invoice date.');
  if (items.length === 0) return alert('Please add at least one line item.');
  if (items.some(i => !i.desc)) return alert('All line items need a description.');

  db.invoices.push({ id: nextId('invoice'), client, clientEmail: email, date, dueDate: due, items, taxRate, status: 'draft', notes, ...(projId ? { projectId: projId } : {}) });
  saveDB();
  closeModal();
  renderInvoices();
}

function paidNoTx(id) {
  setInvStatus(id, 'paid');

function paidWithTx(id) {
  const inv = db.invoices.find(i => i.id === +id);
  if (!inv) return;
  const assetId = parseInt(document.getElementById('mp-asset').value);
  const revId   = parseInt(document.getElementById('mp-rev').value);

function deleteInvoice(id) {

  renderInvoices();
}

function renderPL() {
  const revenues  = db.accounts.filter(a => a.type === 'revenue').sort((a,b) => a.code.localeCompare(b.code));
  const expenses  = db.accounts.filter(a => a.type === 'expense').sort((a,b) => a.code.localeCompare(b.code));
  const rev   = totalRevenue();
  const exp   = totalExpenses();
  const net   = rev - exp;
  const isPos = net >= 0;

  const revRows = revenues.map(a => `
    <div class="report-row">
      <span>${escHtml(a.name)}</span>
      <span>${fmt(getBalance(a.id))}</span>
    </div>
  `).join('') || '<div class="report-row"><span style="color:#94a3b8">No revenue accounts</span><span>—</span></div>';

  const expRows = expenses.map(a => `
    <div class="report-row">
      <span>${escHtml(a.name)}</span>
      <span>${fmt(getBalance(a.id))}</span>
    </div>
  `).join('') || '<div class="report-row"><span style="color:#94a3b8">No expense accounts</span><span>—</span></div>';

  return `
    <div class="card report-section">
      <div class="section-title" style="margin-bottom:14px">Profit & Loss Statement</div>
      <div style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
        <div class="report-section-title">Revenue</div>
        ${revRows}
        <div class="report-row total-row"><span>Total Revenue</span><span style="color:#059669">${fmt(rev)}</span></div>
        <div class="report-section-title">Expenses</div>
        ${expRows}

function renderBalanceSheet() {

  const liabs   = db.accounts.filter(a => a.type === 'liability').sort((a,b) => a.code.localeCompare(b.code));

  const mkRows = (accs) => accs.map(a => `

    <div class="card report-section">

        <div class="report-section-title">Equity</div>
        ${mkRows(equities)}
        <div class="report-row"><span>Net Income (Current)</span><span style="color:${net>=0?'#059669':'#dc2626'}">${fmt(net)}</span></div>

function renderLedger() {
  const txns = [...db.transactions].sort((a,b) => b.date.localeCompare(a.date));
  return `
    <div class="card">
      <div class="section-title" style="margin-bottom:14px">General Ledger</div>
      ${txns.length === 0
        ? '<p style="color:#94a3b8;font-size:13px">No transactions recorded.</p>'
        : `<div class="table-wrap"><table>
          <thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Debit Account</th><th>Credit Account</th><th class="text-right">Amount</th></tr></thead>
          <tbody>
            ${txns.map(t => {
              const from = getAccount(t.fromAccountId);
              const to   = getAccount(t.toAccountId);
              // Debit = toAccountId for income/transfer; fromAccountId for expense
              const debit  = t.type === 'expense' ? from : to;
              const credit = t.type === 'expense' ? to   : from;
              return `<tr>
                <td class="text-muted" style="white-space:nowrap">${fmtDate(t.date)}</td>
                <td>${escHtml(t.description)}</td>
                <td><span class="badge badge-${t.type}">${t.type}</span></td>
                <td class="text-muted">${debit  ? escHtml(debit.name)  : '—'}</td>
                <td class="text-muted">${credit ? escHtml(credit.name) : '—'}</td>
                <td class="fw-600 text-right">${fmt(t.amount)}</td>
              </tr>`;
            }).join('')}
          </tbody>

  `;
}

// Shows a thumbnail preview inside the upload zone while the user is filling the form
function previewReceipt(inputId, thumbId, textId) {
  const file = document.getElementById(inputId).files[0];
  if (!file) return;
  const thumb = document.getElementById(thumbId);
  const text  = document.getElementById(textId);
  text.textContent = file.name;
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (e) => { thumb.src = e.target.result; thumb.style.display = 'block'; };
    reader.readAsDataURL(file);
  } else {
    thumb.style.display = 'none';
  }
}

// Opens a modal to attach a receipt to an existing transaction
function attachReceipt(id) {
  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Attach Receipt</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Receipt File</label>
            <div class="receipt-upload" onclick="document.getElementById('ar-file').click()" id="ar-zone">
              <div class="receipt-upload-text" id="ar-text">📎 <strong>Click to upload</strong> a receipt image or PDF</div>
              <img class="receipt-preview-thumb" id="ar-thumb">
              <input type="file" id="ar-file" accept="image/*,application/pdf" onchange="previewReceipt('ar-file','ar-thumb','ar-text')">
            </div>
            <div class="form-hint">Images (JPG, PNG, GIF, WebP) or PDF · Max 5 MB</div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveAttachedReceipt(${id})">Attach Receipt</button>
        </div>
      </div>
    </div>
  `);
}

// Saves the selected file to an existing transaction
function saveAttachedReceipt(id) {
  const input = document.getElementById('ar-file');
  const file  = input && input.files[0];
  if (!file) return alert('Please select a file.');
  if (file.size > 5 * 1024 * 1024) return alert('File is too large. Maximum size is 5 MB.');
  const tx = db.transactions.find(t => t.id === +id);
  if (!tx) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    tx.receiptData = e.target.result;
    tx.receiptName = file.name;
    tx.receiptType = file.type;
    saveDB();
    closeModal();
    renderTransactions();
  };
  reader.readAsDataURL(file);
}

// Removes the receipt from a transaction
function removeReceipt(id) {
  if (!confirm('Remove this receipt?')) return;
  const tx = db.transactions.find(t => t.id === +id);
  if (tx) {
    delete tx.receiptData;
    delete tx.receiptName;
    delete tx.receiptType;
    saveDB();
  }
  closeModal();
  renderTransactions();
}

          </div>

          </div>

          ${_cloudMode ? `<button class="btn btn-danger" onclick="disconnectCloud()">Disconnect</button>` : ''}

        </div>

async function connectCloud() {
  const pat    = document.getElementById('cloud-pat').value.trim();
  const gistId = document.getElementById('cloud-gist').value.trim();
  if (!pat) return alert('Please enter your GitHub Personal Access Token.');

  const btn = document.getElementById('cloud-connect-btn');
  if (btn) { btn.textContent = 'Connecting…'; btn.disabled = true; }

  try {
    let resolvedId = gistId;

    // Search for existing gist if no ID provided
    if (!resolvedId) {
      const res = await fetch('https://api.github.com/gists?per_page=100', {
        headers: { 'Authorization': `Bearer ${pat}`, 'Accept': 'application/vnd.github+json' }
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.message || `GitHub error ${res.status}`); }
      const list  = await res.json();
      const found = list.find(g => g.description === 'Common Cents Data' && g.files?.['data.json']);
      if (found) resolvedId = found.id;
    }

    let cloudData = null;

    if (resolvedId) {
      // Load existing gist
      const res = await fetch(`https://api.github.com/gists/${resolvedId}`, {
        headers: { 'Authorization': `Bearer ${pat}`, 'Accept': 'application/vnd.github+json' }
      });
      if (!res.ok) throw new Error(`Could not read gist (${res.status})`);
      const gist = await res.json();
      const raw  = gist.files?.['data.json']?.content;
      if (raw) cloudData = JSON.parse(raw);
    } else {
      // No existing gist — create one with current local data
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${pat}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          description: 'Common Cents Data',
          public: false,
          files: { 'data.json': { content: JSON.stringify(db) } }
        })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.message || `Failed to create gist (${res.status})`); }
      const gist = await res.json();
      resolvedId = gist.id;
    }

    // Persist credentials on this device
    localStorage.setItem('cc_cloud_pat',     pat);
    localStorage.setItem('cc_cloud_gist_id', resolvedId);
    _cloudPAT    = pat;
    _cloudGistId = resolvedId;
    _cloudMode   = true;
    startCloudPolling();
    _serverMode  = false;

    // Use cloud data if it exists
    if (cloudData) {
      db = cloudData;
      localStorage.setItem('cc_data_v2', JSON.stringify(cloudData));
    } else {
      saveDB(); // push current local data to the new gist
    }

    closeModal();
    updateSyncBadge();
    navigate(currentPage);

  } catch (err) {
    alert(`Connection failed: ${err.message}\n\nMake sure:\n• The token has the "gist" scope\n• You are connected to the internet`);
    if (btn) { btn.textContent = _cloudMode ? 'Reconnect' : 'Connect & Sync'; btn.disabled = false; }
  }
}

function disconnectCloud() {
  if (!confirm('Disconnect cloud sync on this device?\n\nYour local data and the cloud gist are kept — nothing is deleted.')) return;
  stopCloudPolling();
  localStorage.removeItem('cc_cloud_pat');
  localStorage.removeItem('cc_cloud_gist_id');
  _cloudPAT    = '';
  _cloudGistId = '';
  _cloudMode   = false;
  closeModal();
  updateSyncBadge();
}

function updateSyncBadge(syncing = false) {
  const badge = document.getElementById('sync-badge');
  if (!badge) return;
  if (_cloudMode) {
    const label = syncing ? '☁️ Syncing…' : '☁️ Cloud';
    badge.innerHTML = `<span style="display:inline-flex;align-items:center;gap:4px;background:#eff6ff;color:#1d4ed8;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;" title="Cloud sync active — click to manage" onclick="showCloudSettings()">${label}</span>`;
  } else if (_serverMode) {
    badge.innerHTML = '<span style="display:inline-flex;align-items:center;gap:4px;background:#d1fae5;color:#059669;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;" title="Data shared across all devices on your network">🌐 Network</span>';
  } else {
    badge.innerHTML = '<span style="display:inline-flex;align-items:center;gap:4px;background:#f1f5f9;color:#64748b;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;" title="Local only — click to set up cloud sync" onclick="showCloudSettings()">💾 Local</span>';
  }
}

// ── Auto-polling: pull remote changes every 30 s ─────────────
function startCloudPolling() {
  stopCloudPolling();
  _syncInterval = setInterval(pollCloudUpdates, 30000);
}

function stopCloudPolling() {
  if (_syncInterval) { clearInterval(_syncInterval); _syncInterval = null; }
}

async function pollCloudUpdates() {
  if (!_cloudMode || !_cloudPAT || !_cloudGistId) return;
  // Skip if we saved within the last 10 s to avoid overwriting a just-uploaded state
  if (Date.now() - _lastSaveTime < 10000) return;

  updateSyncBadge(true);
  try {
    const ctrl = new AbortController();
    const t    = setTimeout(() => ctrl.abort(), 8000);
    const res  = await fetch(`https://api.github.com/gists/${_cloudGistId}`, {
      signal: ctrl.signal,
      headers: { 'Authorization': `Bearer ${_cloudPAT}`, 'Accept': 'application/vnd.github+json' }
    });
    clearTimeout(t);
    if (!res.ok) { updateSyncBadge(); return; }

    const gist = await res.json();
    // Only update if the gist was modified after our last known version
    if (gist.updated_at && gist.updated_at !== _lastCloudUpdatedAt) {
      const raw = gist.files?.['data.json']?.content;
      if (raw) {
        _lastCloudUpdatedAt = gist.updated_at;
        db = JSON.parse(raw);
        localStorage.setItem('cc_data_v2', raw);
        navigate(currentPage); // re-render whatever the user is looking at
      }
    }
  } catch (_) { /* network error — silently ignore */ }
  updateSyncBadge();
}

// PROJECTS
// ═══════════════════════════════════════════════════════════

function projIncome(id) {
  return db.transactions.filter(t => t.projectId === id && t.type === 'income').reduce((s,t) => s + t.amount, 0);
}
function projExpenses(id) {
  return db.transactions.filter(t => t.projectId === id && t.type === 'expense').reduce((s,t) => s + t.amount, 0);
}
function projInvoiced(id) {
  return db.invoices.filter(i => i.projectId === id).reduce((s,i) => s + invTotal(i), 0);
}

function renderProjects() {
  const projects = [...db.projects].sort((a,b) => (b.startDate||'').localeCompare(a.startDate||''));
  document.getElementById('main-content').innerHTML = `
    <div class="section-header">
      <div><div class="section-title">Projects</div><div class="section-sub">${projects.length} project${projects.length!==1?'s':''}</div></div>
      <button class="btn btn-primary" onclick="showAddProject()">+ New Project</button>
    </div>
    ${projects.length === 0
      ? `<div class="card"><div class="empty-state"><div class="empty-icon">🗂️</div><div class="empty-title">No projects yet</div><div class="empty-text">Track income, expenses, and invoices by project or job.</div><button class="btn btn-primary" onclick="showAddProject()">+ New Project</button></div></div>`
      : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;">
          ${projects.map(p => {
            const income   = projIncome(p.id);
            const expenses = projExpenses(p.id);
            const invoiced = projInvoiced(p.id);
            const net      = income - expenses;
            const budgetPct = p.budget ? Math.min(100, Math.round((expenses / p.budget) * 100)) : null;
            const statusColor = { active:'#059669', completed:'#1d4ed8', cancelled:'#dc2626' }[p.status] || '#64748b';
            return `<div class="card" style="cursor:default;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
                <div>
                  <div style="font-size:15px;font-weight:700;color:#1e293b;">${escHtml(p.name)}</div>
                  ${p.client ? `<div style="font-size:12px;color:#64748b;margin-top:2px;">👤 ${escHtml(p.client)}</div>` : ''}
                </div>
                <span class="badge" style="background:${statusColor}22;color:${statusColor};">${p.status}</span>
              </div>
              ${p.description ? `<div style="font-size:13px;color:#64748b;margin-bottom:12px;">${escHtml(p.description)}</div>` : ''}
              <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;">
                <div style="background:#f8fafc;border-radius:8px;padding:8px 10px;">
                  <div style="font-size:10px;color:#94a3b8;text-transform:uppercase;font-weight:600;margin-bottom:3px;">Invoiced</div>
                  <div style="font-weight:700;color:#1d4ed8;font-size:13px;">${fmt(invoiced)}</div>
                </div>
                <div style="background:#f8fafc;border-radius:8px;padding:8px 10px;">
                  <div style="font-size:10px;color:#94a3b8;text-transform:uppercase;font-weight:600;margin-bottom:3px;">Expenses</div>
                  <div style="font-weight:700;color:#dc2626;font-size:13px;">${fmt(expenses)}</div>
                </div>
                <div style="background:#f8fafc;border-radius:8px;padding:8px 10px;">
                  <div style="font-size:10px;color:#94a3b8;text-transform:uppercase;font-weight:600;margin-bottom:3px;">Net</div>
                  <div style="font-weight:700;color:${net>=0?'#059669':'#dc2626'};font-size:13px;">${fmt(net)}</div>
                </div>
              </div>
              ${budgetPct !== null ? `
                <div style="margin-bottom:12px;">
                  <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:4px;">
                    <span>Budget Used</span><span>${fmt(expenses)} / ${fmt(p.budget)} (${budgetPct}%)</span>
                  </div>
                  <div class="aging-bar"><div class="aging-fill" style="width:${budgetPct}%;background:${budgetPct>90?'#dc2626':budgetPct>70?'#d97706':'#059669'};"></div></div>
                </div>` : ''}
              ${(p.startDate||p.endDate) ? `<div style="font-size:11px;color:#94a3b8;margin-bottom:10px;">${p.startDate?'Start: '+fmtDate(p.startDate):''}${p.startDate&&p.endDate?' · ':''}${p.endDate?'End: '+fmtDate(p.endDate):''}</div>` : ''}
              <div style="display:flex;gap:6px;">
                <button class="btn btn-sm btn-secondary" style="flex:1;" onclick="viewProject(${p.id})">View Details</button>
                <button class="btn btn-sm btn-secondary" onclick="editProject(${p.id})">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteProject(${p.id})">Delete</button>
              </div>
            </div>`;
          }).join('')}
        </div>`}`;
}

function showAddProject(prefill) {
  const p = prefill || {};
  const customerOpts = db.contacts.filter(c=>c.type==='customer').map(c=>`<option value="${escHtml(c.name)}" ${p.client===c.name?'selected':''}>${escHtml(c.name)}</option>`).join('');
  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal modal-lg">
        <div class="modal-header"><div class="modal-title">${p.id?'Edit':'New'} Project</div><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group" style="grid-column:span 2;">
              <label>Project Name</label>
              <input type="text" id="p-name" value="${escHtml(p.name||'')}" placeholder="e.g. Website Redesign for Acme Corp">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Client (optional)</label>
              <select id="p-client-sel" onchange="if(this.value)document.getElementById('p-client').value=this.value">
                <option value="">— Select from contacts —</option>
                ${customerOpts}
              </select>
            </div>
            <div class="form-group">
              <label>Client Name</label>
              <input type="text" id="p-client" value="${escHtml(p.client||'')}" placeholder="Client or company name">
            </div>
          </div>
          <div class="form-group">
            <label>Description</label>
            <textarea id="p-desc" placeholder="Scope of work, deliverables...">${escHtml(p.description||'')}</textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Status</label>
              <select id="p-status">
                <option value="active"    ${(p.status||'active')==='active'?'selected':''}>Active</option>
                <option value="completed" ${p.status==='completed'?'selected':''}>Completed</option>
                <option value="cancelled" ${p.status==='cancelled'?'selected':''}>Cancelled</option>
              </select>
            </div>
            <div class="form-group">
              <label>Budget ($) <span style="font-weight:400;color:#94a3b8;text-transform:none">(optional)</span></label>
              <input type="number" id="p-budget" value="${p.budget||''}" placeholder="0.00" min="0" step="0.01">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Start Date</label><input type="date" id="p-start" value="${p.startDate||todayStr()}"></div>
            <div class="form-group"><label>End Date <span style="font-weight:400;color:#94a3b8;text-transform:none">(optional)</span></label><input type="date" id="p-end" value="${p.endDate||''}"></div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveProject(${p.id||0})">${p.id?'Save Changes':'Create Project'}</button>
        </div>
      </div>
    </div>`);
  document.getElementById('p-name').focus();
}

function saveProject(id) {
  if (!canEdit()) return alert('You do not have permission to save projects.');
  const name = document.getElementById('p-name').value.trim();
  if (!name) return alert('Please enter a project name.');
  const data = {
    name,
    client:      document.getElementById('p-client').value.trim(),
    description: document.getElementById('p-desc').value.trim(),
    status:      document.getElementById('p-status').value,
    budget:      parseFloat(document.getElementById('p-budget').value) || null,
    startDate:   document.getElementById('p-start').value,
    endDate:     document.getElementById('p-end').value,
  };
  if (id) {
    const p = db.projects.find(x => x.id === id); if (p) Object.assign(p, data);
  } else {
    db.projects.push({ id: nextId('project'), ...data });
  }
  saveDB(); closeModal(); renderProjects();
}

function editProject(id) {
  const p = db.projects.find(x => x.id === id); if (p) showAddProject(p);
}

function deleteProject(id) {
  if (!canDelete()) return alert('Only administrators can delete records.');
  const txCount  = db.transactions.filter(t => t.projectId === id).length;
  const invCount = db.invoices.filter(i => i.projectId === id).length;
  const linked = txCount + invCount;
  const msg = linked
    ? `This project has ${linked} linked record${linked!==1?'s':''} (transactions/invoices).\nDeleting the project will NOT delete them — they will just lose their project link.\n\nDelete project?`
    : 'Delete this project?';
  if (!confirm(msg)) return;
  db.transactions.forEach(t => { if (t.projectId === id) delete t.projectId; });
  db.invoices.forEach(i    => { if (i.projectId === id) delete i.projectId; });
  db.projects = db.projects.filter(p => p.id !== id);
  saveDB(); renderProjects();
}

function viewProject(id) {
  const p = db.projects.find(x => x.id === id); if (!p) return;
  const txns = db.transactions.filter(t => t.projectId === id).sort((a,b) => b.date.localeCompare(a.date));
  const invs = db.invoices.filter(i => i.projectId === id).sort((a,b) => b.date.localeCompare(a.date));
  const income   = projIncome(id);
  const expenses = projExpenses(id);
  const invoiced = projInvoiced(id);
  const net      = income - expenses;

  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal modal-lg">
        <div class="modal-header">
          <div>
            <div class="modal-title">${escHtml(p.name)}</div>
            ${p.client ? `<div style="font-size:12px;color:#64748b;margin-top:2px;">👤 ${escHtml(p.client)}</div>` : ''}
          </div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="stats-grid" style="margin-bottom:16px;">
            <div class="stat-card"><div class="stat-label">Invoiced</div><div class="stat-value" style="color:#1d4ed8;">${fmt(invoiced)}</div></div>
            <div class="stat-card"><div class="stat-label">Income</div><div class="stat-value green">${fmt(income)}</div></div>
            <div class="stat-card"><div class="stat-label">Expenses</div><div class="stat-value red">${fmt(expenses)}</div></div>
            <div class="stat-card"><div class="stat-label">Net Profit</div><div class="stat-value ${net>=0?'green':'red'}">${fmt(net)}</div></div>
          </div>
          ${p.budget ? `<div style="margin-bottom:16px;padding:12px 14px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;">
            <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:6px;">
              <span>Budget</span><span>${fmt(expenses)} spent of ${fmt(p.budget)} (${Math.round((expenses/p.budget)*100)}%)</span>
            </div>
            <div class="aging-bar"><div class="aging-fill" style="width:${Math.min(100,Math.round((expenses/p.budget)*100))}%;background:${expenses>p.budget?'#dc2626':expenses/p.budget>0.8?'#d97706':'#059669'};"></div></div>
          </div>` : ''}
          ${p.description ? `<p style="font-size:13px;color:#64748b;margin-bottom:16px;">${escHtml(p.description)}</p>` : ''}

          <div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:8px;">Transactions (${txns.length})</div>
          ${txns.length === 0
            ? `<p style="font-size:13px;color:#94a3b8;margin-bottom:16px;">No transactions linked to this project yet.</p>`
            : `<div class="table-wrap" style="margin-bottom:16px;"><table>
                <thead><tr><th>Date</th><th>Description</th><th>Type</th><th class="text-right">Amount</th></tr></thead>
                <tbody>${txns.map(t=>`<tr>
                  <td class="text-muted">${fmtDate(t.date)}</td>
                  <td>${escHtml(t.description)}</td>
                  <td><span class="badge badge-${t.type}">${t.type}</span></td>
                  <td class="fw-600 text-right" style="color:${t.type==='income'?'#059669':'#dc2626'}">${fmt(t.amount)}</td>
                </tr>`).join('')}</tbody>
              </table></div>`}

          <div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:8px;">Invoices (${invs.length})</div>
          ${invs.length === 0
            ? `<p style="font-size:13px;color:#94a3b8;">No invoices linked to this project yet.</p>`
            : `<div class="table-wrap"><table>
                <thead><tr><th>#</th><th>Client</th><th>Date</th><th class="text-right">Amount</th><th>Status</th></tr></thead>
                <tbody>${invs.map(i=>`<tr>
                  <td class="text-mono">#${String(i.id).padStart(4,'0')}</td>
                  <td>${escHtml(i.client)}</td>
                  <td class="text-muted">${fmtDate(i.date)}</td>
                  <td class="fw-600 text-right">${fmt(invTotal(i))}</td>
                  <td><span class="badge badge-${i.status}">${i.status}</span></td>
                </tr>`).join('')}</tbody>
              </table></div>`}
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Close</button>
          <button class="btn btn-secondary" onclick="closeModal();editProject(${p.id})">Edit Project</button>
        </div>
      </div>
    </div>`);
}

function renderContacts() {
  const contacts = [...db.contacts].sort((a,b) => a.name.localeCompare(b.name));
  document.getElementById('main-content').innerHTML = `
    <div class="section-header">
      <div><div class="section-title">Contacts</div><div class="section-sub">${contacts.length} contact${contacts.length!==1?'s':''}</div></div>
      <button class="btn btn-primary" onclick="showAddContact()">+ Add Contact</button>
    </div>
    <div class="card">
      ${contacts.length === 0
        ? `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">No contacts yet</div><div class="empty-text">Add customers and vendors to keep track of who you work with.</div><button class="btn btn-primary" onclick="showAddContact()">+ Add Contact</button></div>`
        : `<div class="table-wrap"><table>
          <thead><tr><th>Name</th><th>Type</th><th>Email</th><th>Phone</th><th></th></tr></thead>
          <tbody>${contacts.map(c => `<tr>
            <td class="fw-600">${escHtml(c.name)}</td>
            <td><span class="badge badge-${c.type}">${c.type}</span></td>
            <td class="text-muted">${escHtml(c.email||'—')}</td>
            <td class="text-muted">${escHtml(c.phone||'—')}</td>
            <td style="text-align:right;display:flex;gap:4px;justify-content:flex-end;">
              <button class="btn btn-xs btn-secondary" onclick="editContact(${c.id})">Edit</button>
              <button class="btn btn-xs btn-danger" onclick="deleteContact(${c.id})">Delete</button>
            </td>
          </tr>`).join('')}</tbody>
        </table></div>`}
    </div>`;
}

function showAddContact(prefill) {
  const c = prefill || {};
  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal">
        <div class="modal-header"><div class="modal-title">${c.id ? 'Edit' : 'Add'} Contact</div><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label>Type</label>
              <select id="c-type">
                <option value="customer" ${(c.type||'customer')==='customer'?'selected':''}>Customer</option>
                <option value="vendor"   ${c.type==='vendor'?'selected':''}>Vendor</option>
              </select>
            </div>
            <div class="form-group">
              <label>Name</label>
              <input type="text" id="c-name" value="${escHtml(c.name||'')}" placeholder="Full name or company">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Email</label><input type="email" id="c-email" value="${escHtml(c.email||'')}" placeholder="contact@example.com"></div>
            <div class="form-group"><label>Phone</label><input type="text" id="c-phone" value="${escHtml(c.phone||'')}" placeholder="(555) 000-0000"></div>
          </div>
          <div class="form-group"><label>Address</label><textarea id="c-addr" placeholder="Street, City, State ZIP">${escHtml(c.address||'')}</textarea></div>
          <div class="form-group"><label>Notes</label><textarea id="c-notes" placeholder="Any notes...">${escHtml(c.notes||'')}</textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveContact(${c.id||0})">${c.id ? 'Save Changes' : 'Add Contact'}</button>
        </div>
      </div>
    </div>`);
  document.getElementById('c-name').focus();
}

function saveContact(id) {
  if (!canEdit()) return alert('You do not have permission to save contacts.');
  const name = document.getElementById('c-name').value.trim();
  if (!name) return alert('Please enter a name.');
  const data = {
    type: document.getElementById('c-type').value,
    name,
    email:   document.getElementById('c-email').value.trim(),
    phone:   document.getElementById('c-phone').value.trim(),
    address: document.getElementById('c-addr').value.trim(),
    notes:   document.getElementById('c-notes').value.trim()
  };
  if (id) {
    const c = db.contacts.find(x => x.id === id); if (c) Object.assign(c, data);
  } else {
    db.contacts.push({ id: nextId('contact'), ...data });
  }
  saveDB(); closeModal(); renderContacts();
}

function editContact(id) {
  const c = db.contacts.find(x => x.id === id);
  if (c) showAddContact(c);
}

function deleteContact(id) {
  if (!canDelete()) return alert('Only administrators can delete records.');
  if (!confirm('Delete this contact?')) return;
  db.contacts = db.contacts.filter(c => c.id !== id);
  saveDB(); renderContacts();
}

      <div><div class="section-title">Estimates</div><div class="section-sub">${ests.length} estimate${ests.length!==1?'s':''}</div></div>
      <button class="btn btn-primary" onclick="showAddEstimate()">+ New Estimate</button>
    </div>
    <div class="card">
      ${ests.length === 0
        ? `<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-title">No estimates yet</div><div class="empty-text">Create quotes for clients and convert accepted ones to invoices.</div><button class="btn btn-primary" onclick="showAddEstimate()">+ New Estimate</button></div>`
        : `<div class="table-wrap"><table>
          <thead><tr><th>#</th><th>Client</th><th>Date</th><th>Expires</th><th class="text-right">Amount</th><th>Status</th><th></th></tr></thead>
          <tbody>${ests.map(e => {
            const total = invTotal(e);
            return `<tr>
              <td class="text-mono">#EST-${String(e.id).padStart(4,'0')}</td>
              <td class="fw-600">${escHtml(e.client)}</td>
              <td class="text-muted">${fmtDate(e.date)}</td>
              <td class="text-muted">${fmtDate(e.expiryDate)}</td>
              <td class="fw-600 text-right">${fmt(total)}</td>
              <td><span class="badge badge-${e.status}">${e.status}</span></td>
              <td style="display:flex;gap:4px;justify-content:flex-end;">

let _estItemCount = 0;
function showAddEstimate() {
  _estItemCount = 0;
  const customerOpts = ['<option value="">— Select or type below —</option>',
    ...db.contacts.filter(c=>c.type==='customer').map(c=>`<option value="${escHtml(c.name)}" data-email="${escHtml(c.email||'')}">${escHtml(c.name)}</option>`)
  ].join('');
  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal modal-lg">
        <div class="modal-header"><div class="modal-title">New Estimate</div><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label>Client</label>
              <select id="est-client-sel" onchange="const o=this.options[this.selectedIndex];if(o.value){document.getElementById('est-client').value=o.value;document.getElementById('est-email').value=o.dataset.email||'';}">
                ${customerOpts}
              </select>
            </div>
            <div class="form-group"><label>Client Name</label><input type="text" id="est-client" placeholder="Acme Corp"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Client Email</label><input type="email" id="est-email" placeholder="client@example.com"></div>
            <div class="form-group"><label>Estimate Date</label><input type="date" id="est-date" value="${todayStr()}"></div>
          </div>
          <div class="form-group"><label>Expiry Date</label><input type="date" id="est-expiry"></div>
          <div class="form-group">
            <label>Line Items</label>
            <div class="inv-items-table"><table>
              <thead><tr><th style="width:50%">Description</th><th style="width:15%">Qty</th><th style="width:20%">Rate ($)</th><th style="width:15%">Total</th><th style="width:5%"></th></tr></thead>
              <tbody id="est-tbody"></tbody>
            </table></div>
            <button class="btn btn-sm btn-secondary" style="margin-top:8px" onclick="addEstItem()">+ Add Line Item</button>
          </div>
          <div style="display:flex;justify-content:flex-end;margin-top:10px;">
            <table style="width:240px;font-size:13px;">
              <tr><td style="padding:4px 8px;color:#64748b;">Subtotal</td><td style="padding:4px 8px;text-align:right;font-weight:600;" id="est-subtotal">$0.00</td></tr>
              <tr><td style="padding:4px 8px;color:#64748b;">Tax <input type="number" id="est-taxrate" value="0" min="0" max="100" step="0.1" style="width:56px;padding:2px 6px;font-size:12px;display:inline-block;margin-left:4px;" oninput="recalcEst()">%</td><td style="padding:4px 8px;text-align:right;color:#64748b;" id="est-tax-amt">$0.00</td></tr>
              <tr style="border-top:2px solid #e2e8f0;"><td style="padding:6px 8px;font-weight:700;">Total</td><td style="padding:6px 8px;text-align:right;font-weight:700;font-size:16px;color:#059669;" id="est-grand-total">$0.00</td></tr>
            </table>
          </div>
          <hr class="divider">
          <div class="form-group"><label>Notes</label><textarea id="est-notes" placeholder="Valid for 30 days..."></textarea></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveEstimate()">Create Estimate</button>
        </div>
      </div>
    </div>`);
  addEstItem();
  document.getElementById('est-client').focus();
}

function addEstItem() {
  _estItemCount++;
  const n = _estItemCount;
  const tbody = document.getElementById('est-tbody');
  const tr = document.createElement('tr');
  tr.id = `est-row-${n}`;
  tr.innerHTML = `
    <td><input type="text" id="est-desc-${n}" placeholder="Service or product"></td>
    <td><input type="number" id="est-qty-${n}" value="1" min="0" step="any" style="width:100%" oninput="recalcEst()"></td>
    <td><input type="number" id="est-rate-${n}" value="" min="0" step="0.01" style="width:100%" placeholder="0.00" oninput="recalcEst()"></td>
    <td id="est-line-${n}" style="padding:8px;font-weight:600;font-size:13px;">$0.00</td>
    <td style="padding:4px;text-align:center;"><button class="btn btn-xs btn-ghost" onclick="document.getElementById('est-row-${n}').remove();recalcEst()" title="Remove">✕</button></td>`;
  tbody.appendChild(tr);
}

function recalcEst() {
  let sub = 0;
  for (let i = 1; i <= _estItemCount; i++) {
    const qEl = document.getElementById(`est-qty-${i}`), rEl = document.getElementById(`est-rate-${i}`), lEl = document.getElementById(`est-line-${i}`);
    if (!qEl) continue;
    const line = (parseFloat(qEl.value)||0) * (parseFloat(rEl.value)||0);
    if (lEl) lEl.textContent = fmt(line);
    sub += line;
  }
  const tax = sub * ((parseFloat(document.getElementById('est-taxrate')?.value)||0)/100);
  const s=document.getElementById('est-subtotal'); if(s) s.textContent=fmt(sub);
  const t=document.getElementById('est-tax-amt');  if(t) t.textContent=fmt(tax);
  const g=document.getElementById('est-grand-total'); if(g) g.textContent=fmt(sub+tax);
}

function saveEstimate() {
  if (!canEdit()) return alert('You do not have permission to save estimates.');
  const client = document.getElementById('est-client').value.trim();
  const email  = document.getElementById('est-email').value.trim();
  const date   = document.getElementById('est-date').value;
  const expiry = document.getElementById('est-expiry').value;
  const notes  = document.getElementById('est-notes').value.trim();
  const taxRate = parseFloat(document.getElementById('est-taxrate').value)||0;
  const items = [];
  for (let i = 1; i <= _estItemCount; i++) {
    const d = document.getElementById(`est-desc-${i}`); if (!d) continue;
    const desc = d.value.trim(), qty = parseFloat(document.getElementById(`est-qty-${i}`)?.value)||0, rate = parseFloat(document.getElementById(`est-rate-${i}`)?.value)||0;
    if (desc) items.push({ desc, qty, rate });
  }
  if (!client) return alert('Please enter a client name.');
  if (!date)   return alert('Please select a date.');
  if (items.length === 0) return alert('Please add at least one line item.');
  db.estimates.push({ id: nextId('estimate'), client, clientEmail: email, date, expiryDate: expiry, items, taxRate, status: 'draft', notes });
  saveDB(); closeModal(); renderEstimates();
}

  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">

        <div class="modal-header"><div class="modal-title">Estimate #EST-${String(e.id).padStart(4,'0')}</div><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="modal-body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">

            <span class="badge badge-${e.status}" style="font-size:13px;padding:6px 14px">${e.status.toUpperCase()}</span>

            ${e.expiryDate?`<span>Expires: <strong style="color:#1e293b">${fmtDate(e.expiryDate)}</strong></span>`:''}
          </div>
          <table style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;margin-bottom:12px;">
            <thead style="background:#f8fafc"><tr>
              <th style="padding:8px 14px;text-align:left;font-size:11px;color:#64748b;text-transform:uppercase;">Description</th>
              <th style="padding:8px 14px;text-align:center;font-size:11px;color:#64748b;text-transform:uppercase;">Qty</th>
              <th style="padding:8px 14px;text-align:right;font-size:11px;color:#64748b;text-transform:uppercase;">Rate</th>
              <th style="padding:8px 14px;text-align:right;font-size:11px;color:#64748b;text-transform:uppercase;">Amount</th>
            </tr></thead>
            <tbody>${e.items.map(i=>`<tr><td style="padding:10px 14px">${escHtml(i.desc)}</td><td style="padding:10px 14px;text-align:center">${i.qty}</td><td style="padding:10px 14px;text-align:right">${fmt(i.rate)}</td><td style="padding:10px 14px;text-align:right;font-weight:600">${fmt(i.qty*i.rate)}</td></tr>`).join('')}</tbody>
            <tfoot style="border-top:2px solid #e2e8f0;background:#f8fafc">

              ${e.taxRate?`<tr><td colspan="3" style="padding:8px 14px;text-align:right;color:#64748b">Tax (${e.taxRate}%)</td><td style="padding:8px 14px;text-align:right;color:#64748b">${fmt(tax)}</td></tr>`:''}
              <tr><td colspan="3" style="padding:10px 14px;font-weight:700;text-align:right">Total</td><td style="padding:10px 14px;font-weight:700;font-size:18px;text-align:right;color:#059669">${fmt(total)}</td></tr>
            </tfoot>

          ${e.notes?`<div style="padding:10px 14px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;font-size:13px;color:#64748b"><strong style="color:#475569">Notes:</strong> ${escHtml(e.notes)}</div>`:''}

          ${['draft','sent'].includes(e.status)?`<button class="btn btn-success" onclick="setEstStatus(${e.id},'accepted');closeModal();renderEstimates()">Accept</button><button class="btn btn-danger" onclick="setEstStatus(${e.id},'declined');closeModal();renderEstimates()">Decline</button>`:''}
