<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Common Cents — Accounting</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; color: #1e293b; display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
.sidebar { width: 220px; background: #1e293b; color: #94a3b8; display: flex; flex-direction: column; flex-shrink: 0; transition: width 0.25s ease; overflow: hidden; }
.sidebar.collapsed { width: 56px; }
.sidebar-logo { padding: 14px 14px 14px 18px; font-size: 20px; font-weight: 800; color: #fff; letter-spacing: -0.5px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; white-space: nowrap; overflow: hidden; min-height: 64px; }
.sidebar-logo span { color: #60a5fa; }
.sidebar-logo small { display: block; font-size: 10px; font-weight: 400; color: #64748b; letter-spacing: 0; margin-top: 2px; }
.sidebar-logo-text { overflow: hidden; transition: opacity 0.2s; }
.sidebar.collapsed .sidebar-logo-text { opacity: 0; pointer-events: none; width: 0; }
.sidebar-toggle { background: none; border: none; color: #64748b; cursor: pointer; padding: 6px 7px; border-radius: 6px; font-size: 18px; line-height: 1; flex-shrink: 0; transition: background 0.15s, color 0.15s; }
.sidebar-toggle:hover { background: #334155; color: #e2e8f0; }
.nav-section { padding: 16px 10px 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #475569; white-space: nowrap; overflow: hidden; transition: opacity 0.15s; }
.sidebar.collapsed .nav-section { opacity: 0; pointer-events: none; height: 6px; padding: 0; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; border-radius: 8px; margin: 2px 8px; transition: background 0.15s, color 0.15s, padding 0.25s, margin 0.25s; font-size: 14px; color: #94a3b8; white-space: nowrap; overflow: hidden; }
.sidebar.collapsed .nav-item { margin: 2px 6px; padding: 10px; justify-content: center; gap: 0; }
.nav-item:hover { background: #334155; color: #e2e8f0; }
.nav-item.active { background: #2563eb; color: #fff; }
.nav-icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
.nav-label { transition: opacity 0.2s; overflow: hidden; }
.sidebar.collapsed .nav-label { opacity: 0; width: 0; display: inline-block; }

/* ── Main ── */
.main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
.topbar { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
.topbar-title { font-size: 18px; font-weight: 700; }
.topbar-date { font-size: 13px; color: #64748b; }
.content { padding: 24px; flex: 1; }

/* ── Cards ── */
.card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; }
.stat-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 18px 20px; }
.stat-label { font-size: 12px; color: #64748b; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
.stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
.stat-value.green { color: #059669; }
.stat-value.red { color: #dc2626; }
.stat-value.amber { color: #d97706; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }

/* ── Section header ── */
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.section-title { font-size: 15px; font-weight: 600; color: #1e293b; }
.section-sub { font-size: 13px; color: #64748b; margin-top: 2px; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead th { text-align: left; padding: 10px 14px; background: #f8fafc; color: #64748b; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid #e2e8f0; white-space: nowrap; }
tbody td { padding: 12px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #f8fafc; }
.text-muted { color: #94a3b8; font-size: 12px; }
.text-mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px; }
.text-right { text-align: right; }
.fw-600 { font-weight: 600; }

/* ── Buttons ── */
.btn { padding: 8px 14px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; line-height: 1; white-space: nowrap; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-primary:hover { background: #1d4ed8; }
.btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
.btn-secondary:hover { background: #e2e8f0; }
.btn-danger { background: #fee2e2; color: #dc2626; }
.btn-danger:hover { background: #fecaca; }
.btn-success { background: #d1fae5; color: #059669; }
.btn-success:hover { background: #a7f3d0; }
.btn-warning { background: #fef3c7; color: #92400e; }
.btn-warning:hover { background: #fde68a; }
.btn-ghost { background: transparent; color: #64748b; }
.btn-ghost:hover { background: #f1f5f9; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 5px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 4px; }

/* ── Badges ── */
.badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: capitalize; }
.badge-asset { background: #dbeafe; color: #1d4ed8; }
.badge-liability { background: #fee2e2; color: #dc2626; }
.badge-equity { background: #ede9fe; color: #7c3aed; }
.badge-revenue { background: #d1fae5; color: #059669; }
.badge-expense { background: #fef3c7; color: #92400e; }
.badge-income { background: #d1fae5; color: #059669; }
.badge-transfer { background: #e0e7ff; color: #4f46e5; }
.badge-draft { background: #f1f5f9; color: #64748b; }
.badge-sent { background: #dbeafe; color: #1d4ed8; }
.badge-paid { background: #d1fae5; color: #059669; }
.badge-overdue { background: #fee2e2; color: #dc2626; }
.badge-active { background: #d1fae5; color: #059669; }
.badge-completed { background: #f1f5f9; color: #64748b; }
.badge-project { background: #ede9fe; color: #7c3aed; font-size: 11px; }

/* ── Project cards ── */
.project-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }
.project-card { background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; padding: 20px; cursor: pointer; transition: all 0.15s; }

.project-card-stat { text-align: center; }
.project-card-stat-label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
.project-card-stat-value { font-size: 14px; font-weight: 700; margin-top: 2px; }

/* ── Modal ── */

.modal-lg { width: 740px; }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: #fff; z-index: 1; border-radius: 14px 14px 0 0; }
.modal-title { font-size: 16px; font-weight: 700; }
.modal-close { background: #f1f5f9; border: none; cursor: pointer; font-size: 16px; width: 30px; height: 30px; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #64748b; transition: all 0.15s; }
.modal-close:hover { background: #e2e8f0; color: #1e293b; }
.modal-body { padding: 20px 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid #f1f5f9; display: flex; gap: 8px; justify-content: flex-end; background: #f8fafc; border-radius: 0 0 14px 14px; }

/* ── Forms ── */
.form-group { margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }
label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
input[type=text], input[type=number], input[type=date], input[type=email], select, textarea {
  width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 7px; font-size: 14px; color: #1e293b; background: #fff; transition: border-color 0.15s, box-shadow 0.15s; font-family: inherit;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
input::placeholder { color: #94a3b8; }
textarea { resize: vertical; min-height: 70px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

/* ── Invoice items ── */
.inv-items-table { width: 100%; border: 1.5px solid #e2e8f0; border-radius: 8px; overflow: hidden; margin-top: 6px; }
.inv-items-table table { margin: 0; }

.inv-total-row { display: flex; justify-content: flex-end; gap: 16px; align-items: center; margin-top: 10px; font-size: 14px; }
.inv-total-row .total-label { color: #64748b; font-weight: 500; }
.inv-total-row .total-value { font-weight: 700; font-size: 18px; color: #1e293b; min-width: 100px; text-align: right; }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 52px 24px; }
.empty-icon { font-size: 44px; margin-bottom: 12px; opacity: 0.7; }
.empty-title { font-size: 15px; font-weight: 600; color: #475569; margin-bottom: 6px; }
.empty-text { font-size: 13px; color: #94a3b8; margin-bottom: 18px; }

/* ── Reports ── */
.report-section { margin-bottom: 24px; }
.report-section-title { font-size: 13px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.07em; padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
.report-row { display: flex; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #f8fafc; font-size: 13.5px; }
.report-row:last-child { border-bottom: none; }
.report-row.total-row { background: #f8fafc; font-weight: 700; border-top: 2px solid #e2e8f0; }
.report-row.grand-total { background: #1e293b; color: #fff; font-weight: 700; font-size: 15px; }
.report-row.grand-total.green { background: #059669; }
.report-row.grand-total.red { background: #dc2626; }

/* ── Dashboard grid ── */
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* ── Print ── */
@media print {
  .sidebar, .topbar, .btn, .section-header .btn { display: none !important; }
  .main { overflow: visible; }
  .content { padding: 0; }
}

/* ── Divider ── */
.divider { border: none; border-top: 1px solid #f1f5f9; margin: 16px 0; }

/* ── Receipt ── */
.receipt-upload { border: 2px dashed #e2e8f0; border-radius: 8px; padding: 14px 16px; text-align: center; cursor: pointer; transition: all 0.15s; background: #f8fafc; }
.receipt-upload:hover { border-color: #2563eb; background: #eff6ff; }
.receipt-upload input[type=file] { display: none; }
.receipt-upload-text { font-size: 13px; color: #64748b; }
.receipt-upload-text strong { color: #2563eb; }
.receipt-preview-thumb { max-width: 100%; max-height: 140px; border-radius: 6px; border: 1px solid #e2e8f0; margin-top: 8px; display: none; object-fit: contain; }
.receipt-badge { display: inline-flex; align-items: center; gap: 3px; padding: 3px 8px; background: #fef3c7; color: #92400e; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; border: none; transition: background 0.15s; }
.receipt-badge:hover { background: #fde68a; }
.receipt-modal-img { max-width: 100%; max-height: 65vh; border-radius: 8px; border: 1px solid #e2e8f0; display: block; margin: 0 auto; }
</style>

<body>

<!-- ══════════════════════════════════════════════════ SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="sidebar-logo-text">Common <span>Cents</span><small>Accounting</small></div>
    <button class="sidebar-toggle" id="sidebar-toggle-btn" onclick="toggleSidebar()" title="Collapse sidebar">&#9776;</button>
  </div>
  <nav style="padding: 8px 0 16px;">
    <div class="nav-section">Main</div>
    <div class="nav-item active" data-section="dashboard" onclick="navigate('dashboard')" title="Dashboard">
      <span class="nav-icon">📊</span><span class="nav-label"> Dashboard</span>
    </div>

      <span class="nav-icon">🏦</span><span class="nav-label"> Accounts</span>
    </div>
    <div class="nav-item" data-section="transactions" onclick="navigate('transactions')" title="Transactions">
      <span class="nav-icon">💸</span><span class="nav-label"> Transactions</span>
    </div>
    <div class="nav-item" data-section="invoices" onclick="navigate('invoices')" title="Invoices">

<!-- ══════════════════════════════════════════════════ MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title" id="topbar-title">Dashboard</div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="topbar-date" id="topbar-date"></div>
      <span id="sync-badge"></span>
      <button class="btn btn-sm btn-secondary" onclick="showCloudSettings()" title="Set up cloud sync to access your data from any device" style="font-size:11px;">☁️ Cloud Sync</button>
    </div>
  </div>
  <div class="content" id="main-content"></div>
</div>

<!-- Modal Mount -->
<div id="modal-root"></div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════════

const DEFAULT_ACCOUNTS = [
  { id: 1,  code: '1001', name: 'Cash',              type: 'asset' },
  { id: 2,  code: '1002', name: 'Checking Account',  type: 'asset' },
  { id: 3,  code: '1003', name: 'Savings Account',   type: 'asset' },
  { id: 4,  code: '1100', name: 'Accounts Receivable', type: 'asset' },
  { id: 5,  code: '2001', name: 'Accounts Payable',  type: 'liability' },
  { id: 6,  code: '2100', name: 'Credit Card',       type: 'liability' },
  { id: 7,  code: '3001', name: "Owner's Equity",    type: 'equity' },
  { id: 8,  code: '3002', name: 'Retained Earnings', type: 'equity' },
  { id: 9,  code: '4001', name: 'Sales Revenue',     type: 'revenue' },
  { id: 10, code: '4002', name: 'Service Revenue',   type: 'revenue' },
  { id: 11, code: '5001', name: 'Rent Expense',      type: 'expense' },
  { id: 12, code: '5002', name: 'Office Expenses',   type: 'expense' },
  { id: 13, code: '5003', name: 'Utilities',         type: 'expense' },
  { id: 14, code: '5004', name: 'Salaries & Wages',  type: 'expense' },
  { id: 15, code: '5005', name: 'Marketing',         type: 'expense' },
];

let db = {
  accounts: JSON.parse(JSON.stringify(DEFAULT_ACCOUNTS)),
  transactions: [],  // { id, date, type, description, amount, fromAccountId, toAccountId, projectId? }
  invoices: [],      // { id, client, clientEmail, date, dueDate, items:[{desc,qty,rate}], status, notes, projectId? }
  projects: [],      // { id, name, client, status, description }
  bizInfo: { name: '', address: '', email: '', phone: '' },
  nextId: { account: 16, transaction: 1, invoice: 1, project: 1 }
};

// true when the app is being served by server.js (network mode)
let _serverMode = false;

// Cloud sync via GitHub Gist (credentials stored in localStorage only, never in code)
let _cloudMode   = false;
let _cloudPAT    = localStorage.getItem('cc_cloud_pat')     || '';
let _cloudGistId = localStorage.getItem('cc_cloud_gist_id') || '';

async function loadDB() {
  // ── 1. Cloud (GitHub Gist) — highest priority ────────────────
  if (_cloudPAT) {
    try {
      // Auto-discover gist if ID not cached on this device
      if (!_cloudGistId) {
        const ctrl = new AbortController();
        const t    = setTimeout(() => ctrl.abort(), 8000);
        const res  = await fetch('https://api.github.com/gists?per_page=100', {
          signal: ctrl.signal,
          headers: { 'Authorization': `Bearer ${_cloudPAT}`, 'Accept': 'application/vnd.github+json' }
        });
        clearTimeout(t);
        if (res.ok) {
          const list  = await res.json();
          const found = list.find(g => g.description === 'Common Cents Data' && g.files?.['data.json']);
          if (found) {
            _cloudGistId = found.id;
            localStorage.setItem('cc_cloud_gist_id', _cloudGistId);
          }
        }
      }

      if (_cloudGistId) {
        const ctrl = new AbortController();
        const t    = setTimeout(() => ctrl.abort(), 8000);
        const res  = await fetch(`https://api.github.com/gists/${_cloudGistId}`, {
          signal: ctrl.signal,
          headers: { 'Authorization': `Bearer ${_cloudPAT}`, 'Accept': 'application/vnd.github+json' }
        });
        clearTimeout(t);
        if (res.ok) {
          const gist = await res.json();
          const raw  = gist.files?.['data.json']?.content;
          if (raw) {
            db = JSON.parse(raw);
            _cloudMode = true;
            localStorage.setItem('cc_data_v2', raw); // local cache for offline fallback
            return;
          }
        }
      }
    } catch (_) { /* cloud unavailable — fall through */ }
  }

  // ── 2. Local network server ──────────────────────────────────
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 2000);
    const res = await fetch('/api/data', { signal: controller.signal });
    clearTimeout(timer);

    if (res.ok) {
      const data = await res.json();
      _serverMode = true;

      if (data && data.accounts && data.accounts.length > 0) {
        db = data;
        return;
      }

      // Server empty — migrate localStorage up to it
      try {
        const raw = localStorage.getItem('cc_data_v2');
        if (raw) {
          const local = JSON.parse(raw);
          if (local && local.accounts) { db = local; saveDB(); return; }
        }
      } catch (_) {}
      return;
    }
  } catch (_) { /* server not running */ }

  // ── 3. localStorage fallback ─────────────────────────────────
  try {
    const raw = localStorage.getItem('cc_data_v2');
    if (raw) db = JSON.parse(raw);
  } catch (_) { /* keep defaults */ }
}

function saveDB() {
  const json = JSON.stringify(db);
  // Always write a local cache so the app works offline / after cloud errors
  localStorage.setItem('cc_data_v2', json);

  if (_cloudMode && _cloudPAT && _cloudGistId) {
    // Cloud sync — fire-and-forget (local cache already written above)
    fetch(`https://api.github.com/gists/${_cloudGistId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `Bearer ${_cloudPAT}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ files: { 'data.json': { content: json } } })
    }).catch(() => { /* silently ignore — local cache is the fallback */ });
  } else if (_serverMode) {
    fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: json
    }).catch(() => { /* local cache already written */ });
  }
}

function nextId(type) {
  const id = db.nextId[type];
  db.nextId[type]++;
  return id;
}

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════

const fmt = (n) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(n || 0);

function fmtDate(s) {
  if (!s) return '—';
  const [y, m, d] = s.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[+m-1]} ${+d}, ${y}`;
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function getAccount(id) {
  return db.accounts.find(a => a.id === +id);
}

// Balance rules:
//   income   → fromAccountId (revenue) ↑, toAccountId (asset) ↑
//   expense  → fromAccountId (expense) ↑, toAccountId (asset) ↓
//   transfer → fromAccountId (asset)   ↓, toAccountId (asset) ↑
function getBalance(accountId) {
  let bal = 0;
  const id = +accountId;
  for (const t of db.transactions) {
    if (t.type === 'income') {
      if (t.fromAccountId === id) bal += t.amount;  // revenue ↑
      if (t.toAccountId   === id) bal += t.amount;  // asset ↑
    } else if (t.type === 'expense') {
      if (t.fromAccountId === id) bal += t.amount;  // expense ↑
      if (t.toAccountId   === id) bal -= t.amount;  // asset ↓
    } else { // transfer
      if (t.fromAccountId === id) bal -= t.amount;
      if (t.toAccountId   === id) bal += t.amount;
    }
  }
  return bal;
}

function sumByType(...types) {
  return db.accounts
    .filter(a => types.includes(a.type))
    .reduce((s, a) => s + getBalance(a.id), 0);
}

const totalRevenue  = () => sumByType('revenue');
const totalExpenses = () => sumByType('expense');
const netIncome     = () => totalRevenue() - totalExpenses();
const totalAssets   = () => sumByType('asset');
const totalLiab     = () => sumByType('liability');
const totalEquity   = () => sumByType('equity');

function invTotal(inv) {
  return (inv.items || []).reduce((s, i) => s + (i.qty * i.rate), 0);
}
function invPending() {
  return db.invoices.filter(i => ['draft','sent','overdue'].includes(i.status))
    .reduce((s, i) => s + invTotal(i), 0);
}
function invCollected() {
  return db.invoices.filter(i => i.status === 'paid').reduce((s, i) => s + invTotal(i), 0);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const ACCOUNT_TYPES = ['asset','liability','equity','revenue','expense'];
const TYPE_LABELS = { asset:'Asset', liability:'Liability', equity:'Equity', revenue:'Revenue', expense:'Expense' };
const TYPE_COLORS = { asset:'#1d4ed8', liability:'#dc2626', equity:'#7c3aed', revenue:'#059669', expense:'#d97706' };

function renderAccounts() {
  let html = `
    <div class="section-header">
      <div>
        <div class="section-title">Chart of Accounts</div>
        <div class="section-sub">${db.accounts.length} accounts</div>
      </div>

  for (const type of ACCOUNT_TYPES) {
    const accounts = db.accounts.filter(a => a.type === type).sort((a,b) => a.code.localeCompare(b.code));
    const typeTotal = accounts.reduce((s,a) => s + getBalance(a.id), 0);

    html += `<div class="card" style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="badge badge-${type}">${TYPE_LABELS[type]}s</span>
          <span style="font-size:12px;color:#64748b;">${accounts.length} account${accounts.length!==1?'s':''}</span>
        </div>
        <span class="fw-600" style="color:${TYPE_COLORS[type]}">${fmt(typeTotal)}</span>
      </div>
      ${accounts.length === 0
        ? `<p style="color:#94a3b8;font-size:13px;padding:8px 0;">No ${type} accounts. Add one above.</p>`
        : `<table>
          <thead><tr><th>Code</th><th>Account Name</th><th>Type</th><th class="text-right">Balance</th><th></th></tr></thead>
          <tbody>
            ${accounts.map(a => {
              const bal = getBalance(a.id);
              return `<tr>
                <td class="text-mono">${escHtml(a.code)}</td>
                <td class="fw-600">${escHtml(a.name)}</td>
                <td><span class="badge badge-${a.type}">${TYPE_LABELS[a.type]}</span></td>
                <td class="text-right fw-600">${fmt(bal)}</td>
                <td class="text-right">
                  <button class="btn btn-xs btn-danger" onclick="deleteAccount(${a.id})">Delete</button>
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`}
    </div>`;
  }

  document.getElementById('main-content').innerHTML = html;
}

function showAddAccount() {
  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Add Account</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label>Account Code</label>
              <input type="text" id="f-code" placeholder="e.g. 1010">
            </div>
            <div class="form-group">
              <label>Account Type</label>
              <select id="f-type">
                <option value="asset">Asset</option>
                <option value="liability">Liability</option>
                <option value="equity">Equity</option>
                <option value="revenue">Revenue</option>
                <option value="expense">Expense</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Account Name</label>
            <input type="text" id="f-name" placeholder="e.g. Business Savings">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="addAccount()">Add Account</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('f-name').focus();
}

function addAccount() {
  const code = document.getElementById('f-code').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const type = document.getElementById('f-type').value;
  if (!code || !name) return alert('Please fill in all fields.');
  if (db.accounts.some(a => a.code === code)) return alert('Account code already exists.');
  db.accounts.push({ id: nextId('account'), code, name, type });
  saveDB();
  closeModal();
  renderAccounts();
}

function deleteAccount(id) {
  const used = db.transactions.some(t => t.fromAccountId === +id || t.toAccountId === +id);
  if (used) return alert('Cannot delete: this account has transactions.');
  if (!confirm('Delete this account? This cannot be undone.')) return;
  db.accounts = db.accounts.filter(a => a.id !== +id);
  saveDB();
  renderAccounts();
}

function buildAccountOptions(types) {
  return db.accounts
    .filter(a => !types || types.includes(a.type))
    .sort((a,b) => a.code.localeCompare(b.code))
    .map(a => `<option value="${a.id}">${a.code} — ${escHtml(a.name)}</option>`)
    .join('');
}

function buildProjectOptions(selectedId) {
  if (!db.projects || db.projects.length === 0) return '<option value="">No projects</option>';
  const active = db.projects.filter(p => p.status === 'active').sort((a,b) => a.name.localeCompare(b.name));
  const completed = db.projects.filter(p => p.status === 'completed').sort((a,b) => a.name.localeCompare(b.name));
  let html = '<option value="">None</option>';
  if (active.length) {
    html += active.map(p => `<option value="${p.id}" ${+selectedId===p.id?'selected':''}>${escHtml(p.name)}${p.client ? ' — '+escHtml(p.client) : ''}</option>`).join('');
  }
  if (completed.length) {
    html += `<optgroup label="Completed">` + completed.map(p => `<option value="${p.id}" ${+selectedId===p.id?'selected':''}>${escHtml(p.name)}</option>`).join('') + `</optgroup>`;
  }
  return html;
}

              <img class="receipt-preview-thumb" id="t-receipt-thumb">

          </div>

        <div class="modal-footer">

        </div>
      </div>

}

function txTypeChange() {
  const type = document.getElementById('t-type').value;
  const fromLabel = document.getElementById('t-from-label');
  const toLabel   = document.getElementById('t-to-label');
  const fromSel   = document.getElementById('t-from');
  const toSel     = document.getElementById('t-to');

  if (type === 'income') {
    fromLabel.textContent = 'Revenue Account';
    fromSel.innerHTML = buildAccountOptions(['revenue']);
    toLabel.textContent = 'Deposit To';
    toSel.innerHTML = buildAccountOptions(['asset']);
  } else if (type === 'expense') {
    fromLabel.textContent = 'Expense Category';
    fromSel.innerHTML = buildAccountOptions(['expense']);
    toLabel.textContent = 'Paid From';
    toSel.innerHTML = buildAccountOptions(['asset']);
  } else {
    fromLabel.textContent = 'Transfer From';
    fromSel.innerHTML = buildAccountOptions(['asset']);
    toLabel.textContent = 'Transfer To';
    toSel.innerHTML = buildAccountOptions(['asset']);
  }
}

function addTransaction() {
  const date   = document.getElementById('t-date').value;
  const type   = document.getElementById('t-type').value;
  const desc   = document.getElementById('t-desc').value.trim();
  const amount = parseFloat(document.getElementById('t-amount').value);
  const fromId = parseInt(document.getElementById('t-from').value);
  const toId   = parseInt(document.getElementById('t-to').value);

  if (!date || !desc) return alert('Please fill in date and description.');
  if (isNaN(amount) || amount <= 0) return alert('Please enter a valid amount.');
  if (type === 'transfer' && fromId === toId) return alert('Transfer accounts must be different.');

  const projVal = document.getElementById('t-project').value;
  const txData = { id: nextId('transaction'), date, type, description: desc, amount, fromAccountId: fromId, toAccountId: toId };
  if (projVal) txData.projectId = parseInt(projVal);

  const fileInput = document.getElementById('t-receipt');
  const file = fileInput && fileInput.files[0];
  if (file) {
    if (file.size > 5 * 1024 * 1024) return alert('Receipt file is too large. Maximum size is 5 MB.');
    const reader = new FileReader();
    reader.onload = (e) => {
      txData.receiptData = e.target.result;
      txData.receiptName = file.name;
      txData.receiptType = file.type;
      db.transactions.push(txData);
      saveDB();
      closeModal();
      renderTransactions();
    };
    reader.readAsDataURL(file);
  } else {
    db.transactions.push(txData);
    saveDB();
    closeModal();
    renderTransactions();
  }
}

function deleteTransaction(id) {
  if (!confirm('Delete this transaction?')) return;
  db.transactions = db.transactions.filter(t => t.id !== +id);
  saveDB();
  renderTransactions();
}

  document.getElementById('main-content').innerHTML = `

                <td class="text-mono">#${String(inv.id).padStart(4,'0')}</td>
                <td class="fw-600">${escHtml(inv.client)}</td>

      <div class="modal modal-lg">
        <div class="modal-header">
          <div class="modal-title">New Invoice</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label>Client Name</label>
              <input type="text" id="i-client" placeholder="Acme Corp">
            </div>
            <div class="form-group">
              <label>Client Email</label>
              <input type="email" id="i-email" placeholder="client@example.com">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Invoice Date</label>
              <input type="date" id="i-date" value="${todayStr()}">
            </div>
            <div class="form-group">
              <label>Due Date</label>
              <input type="date" id="i-due">
            </div>
          </div>
          <div class="form-group">
            <label>Project <span style="font-weight:400;color:#94a3b8;text-transform:none">(optional)</span></label>
            <select id="i-project">${buildProjectOptions()}</select>
          </div>

          <div class="form-group">
            <label>Line Items</label>
            <div class="inv-items-table">
              <table>
                <thead><tr><th style="width:50%">Description</th><th style="width:15%">Qty</th><th style="width:20%">Rate ($)</th><th style="width:15%">Total</th><th style="width:5%"></th></tr></thead>
                <tbody id="inv-tbody"></tbody>
              </table>
            </div>
            <button class="btn btn-sm btn-secondary" style="margin-top:8px" onclick="addInvItem()">+ Add Line Item</button>
          </div>

          <div class="inv-total-row">
            <span class="total-label">Invoice Total:</span>
            <span class="total-value" id="inv-grand-total">$0.00</span>
          </div>

          <hr class="divider">
          <div class="form-group">
            <label>Notes / Terms</label>
            <textarea id="i-notes" placeholder="Payment due within 30 days. Thank you for your business!"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveInvoice()">Create Invoice</button>
        </div>
      </div>
    </div>
  `);
  addInvItem();
  document.getElementById('i-client').focus();
}

function addInvItem() {
  _itemCount++;
  const n = _itemCount;
  const tbody = document.getElementById('inv-tbody');
  const tr = document.createElement('tr');
  tr.id = `inv-row-${n}`;
  tr.innerHTML = `
    <td><input type="text" id="inv-desc-${n}" placeholder="Service or product description"></td>
    <td><input type="number" id="inv-qty-${n}"  value="1"    min="0" step="any" style="width:100%" oninput="recalcInv()"></td>
    <td><input type="number" id="inv-rate-${n}" value=""     min="0" step="0.01" style="width:100%" placeholder="0.00" oninput="recalcInv()"></td>
    <td id="inv-line-${n}" style="padding:8px;font-weight:600;font-size:13px;">$0.00</td>
    <td style="padding:4px;text-align:center;"><button class="btn btn-xs btn-ghost" onclick="removeInvItem(${n})" title="Remove">✕</button></td>
  `;
  tbody.appendChild(tr);
}

function removeInvItem(n) {
  const row = document.getElementById(`inv-row-${n}`);
  if (row) row.remove();
  recalcInv();
}

function recalcInv() {
  let grand = 0;
  for (let i = 1; i <= _itemCount; i++) {
    const qtyEl  = document.getElementById(`inv-qty-${i}`);
    const rateEl = document.getElementById(`inv-rate-${i}`);
    const lineEl = document.getElementById(`inv-line-${i}`);
    if (!qtyEl || !rateEl || !lineEl) continue;
    const line = (parseFloat(qtyEl.value)||0) * (parseFloat(rateEl.value)||0);
    lineEl.textContent = fmt(line);
    grand += line;
  }
  const el = document.getElementById('inv-grand-total');
  if (el) el.textContent = fmt(grand);
}

function getInvItems() {
  const items = [];
  for (let i = 1; i <= _itemCount; i++) {
    const descEl = document.getElementById(`inv-desc-${i}`);
    const qtyEl  = document.getElementById(`inv-qty-${i}`);
    const rateEl = document.getElementById(`inv-rate-${i}`);
    if (!descEl) continue;
    const desc = descEl.value.trim();
    const qty  = parseFloat(qtyEl.value)  || 0;
    const rate = parseFloat(rateEl.value) || 0;
    if (desc) items.push({ desc, qty, rate });
  }
  return items;
}

function saveInvoice() {
  const client = document.getElementById('i-client').value.trim();
  const email  = document.getElementById('i-email').value.trim();
  const date   = document.getElementById('i-date').value;
  const due    = document.getElementById('i-due').value;
  const notes  = document.getElementById('i-notes').value.trim();
  const items  = getInvItems();

  if (!client) return alert('Please enter a client name.');
  if (!date)   return alert('Please select an invoice date.');
  if (items.length === 0) return alert('Please add at least one line item.');
  if (items.some(i => !i.desc)) return alert('All line items need a description.');

  const invProjVal = document.getElementById('i-project').value;
  const invData = { id: nextId('invoice'), client, clientEmail: email, date, dueDate: due, items, status: 'draft', notes };
  if (invProjVal) invData.projectId = parseInt(invProjVal);
  db.invoices.push(invData);
  saveDB();
  closeModal();
  renderInvoices();
}

function viewInvoice(id) {
  const inv = db.invoices.find(i => i.id === +id);
  if (!inv) return;
  const total = invTotal(inv);
  const itemRows = inv.items.map(item => `
    <tr>
      <td style="padding:10px 14px">${escHtml(item.desc)}</td>
      <td style="padding:10px 14px;text-align:center">${item.qty}</td>
      <td style="padding:10px 14px;text-align:right">${fmt(item.rate)}</td>
      <td style="padding:10px 14px;text-align:right;font-weight:600">${fmt(item.qty * item.rate)}</td>
    </tr>
  `).join('');

  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal modal-lg">
        <div class="modal-header">
          <div class="modal-title">Invoice #${String(inv.id).padStart(4,'0')}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
            <div>
              <div style="font-size:22px;font-weight:800;color:#1e293b">INVOICE</div>
              <div style="font-size:13px;color:#64748b;margin-top:4px">#${String(inv.id).padStart(4,'0')}</div>
            </div>
            <span class="badge badge-${inv.status}" style="font-size:13px;padding:6px 14px">${inv.status.toUpperCase()}</span>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
            <div>
              <div style="font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;margin-bottom:4px">Bill To</div>
              <div style="font-weight:600;font-size:15px">${escHtml(inv.client)}</div>
              ${inv.clientEmail ? `<div style="font-size:13px;color:#64748b">${escHtml(inv.clientEmail)}</div>` : ''}
            </div>
            <div style="text-align:right">
              <div style="margin-bottom:4px"><span style="color:#64748b;font-size:13px">Invoice Date: </span><strong>${fmtDate(inv.date)}</strong></div>
              ${inv.dueDate ? `<div><span style="color:#64748b;font-size:13px">Due Date: </span><strong>${fmtDate(inv.dueDate)}</strong></div>` : ''}
            </div>
          </div>

          <table style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
            <thead style="background:#f8fafc">
              <tr>
                <th style="padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;color:#64748b">Description</th>
                <th style="padding:10px 14px;text-align:center;font-size:11px;text-transform:uppercase;color:#64748b">Qty</th>
                <th style="padding:10px 14px;text-align:right;font-size:11px;text-transform:uppercase;color:#64748b">Rate</th>
                <th style="padding:10px 14px;text-align:right;font-size:11px;text-transform:uppercase;color:#64748b">Amount</th>
              </tr>
            </thead>
            <tbody>${itemRows}</tbody>
            <tfoot style="border-top:2px solid #e2e8f0;background:#f8fafc">
              <tr>
                <td colspan="3" style="padding:12px 14px;font-weight:700;text-align:right">Total</td>
                <td style="padding:12px 14px;font-weight:700;font-size:18px;text-align:right;color:#059669">${fmt(total)}</td>
              </tr>
            </tfoot>
          </table>

          ${inv.notes ? `<div style="margin-top:16px;padding:12px 14px;background:#f8fafc;border-radius:8px;font-size:13px;color:#64748b;border:1px solid #e2e8f0"><strong style="color:#475569">Notes:</strong> ${escHtml(inv.notes)}</div>` : ''}
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Close</button>
          <button class="btn btn-secondary" onclick="printInvoice(${inv.id})">🖨 Print / PDF</button>
          ${inv.status === 'draft' ? `<button class="btn btn-warning" onclick="setInvStatus(${inv.id},'sent');closeModal();renderInvoices()">Mark as Sent</button>` : ''}
          ${inv.status !== 'paid' ? `<button class="btn btn-success" onclick="markPaid(${inv.id})">Mark as Paid</button>` : ''}
        </div>
      </div>
    </div>
  `);
}

function setInvStatus(id, status) {
  const inv = db.invoices.find(i => i.id === +id);
  if (inv) { inv.status = status; saveDB(); }
}

function markPaid(id) {
  const inv = db.invoices.find(i => i.id === +id);
  if (!inv) return;
  const total = invTotal(inv);
  const assetOpts = buildAccountOptions(['asset']);
  const revOpts   = buildAccountOptions(['revenue']);

  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Mark Invoice #${String(inv.id).padStart(4,'0')} as Paid</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <p style="font-size:14px;color:#475569;margin-bottom:16px">
            This will mark the invoice as paid and optionally record a transaction for <strong>${fmt(total)}</strong>.
          </p>
          <div class="form-group">
            <label>Deposit To Account</label>
            <select id="mp-asset">${assetOpts}</select>
          </div>
          <div class="form-group">
            <label>Revenue Account</label>
            <select id="mp-rev">${revOpts}</select>
          </div>
          <div class="form-group">
            <label>Date Received</label>
            <input type="date" id="mp-date" value="${todayStr()}">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-secondary" onclick="paidNoTx(${inv.id})">Mark Paid (No Transaction)</button>
          <button class="btn btn-success" onclick="paidWithTx(${inv.id})">Mark Paid + Record Payment</button>
        </div>
      </div>
    </div>
  `);
}

function paidNoTx(id) {
  setInvStatus(id, 'paid');
  closeModal();
  renderInvoices();
}

function paidWithTx(id) {
  const inv = db.invoices.find(i => i.id === +id);
  if (!inv) return;
  const assetId = parseInt(document.getElementById('mp-asset').value);
  const revId   = parseInt(document.getElementById('mp-rev').value);
  const date    = document.getElementById('mp-date').value;
  if (!date) return alert('Please select a date.');

  const paidTx = {
    id: nextId('transaction'),
    date,
    type: 'income',
    description: `Invoice #${String(inv.id).padStart(4,'0')} — ${inv.client}`,
    amount: invTotal(inv),
    fromAccountId: revId,
    toAccountId: assetId
  };
  if (inv.projectId) paidTx.projectId = inv.projectId;
  db.transactions.push(paidTx);
  setInvStatus(id, 'paid');
  saveDB();
  closeModal();
  renderInvoices();
}

function deleteInvoice(id) {
  if (!confirm('Delete this invoice?')) return;
  db.invoices = db.invoices.filter(i => i.id !== +id);
  saveDB();
  renderInvoices();
}

function renderReports() {
  document.getElementById('main-content').innerHTML = `
    <div class="section-header">
      <div class="section-title">Financial Reports</div>
      <button class="btn btn-secondary" onclick="window.print()">🖨 Print</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      ${renderPL()}
      ${renderBalanceSheet()}
    </div>
    <div style="margin-top:16px;">${renderLedger()}</div>
  `;
}

function renderPL() {
  const revenues  = db.accounts.filter(a => a.type === 'revenue').sort((a,b) => a.code.localeCompare(b.code));
  const expenses  = db.accounts.filter(a => a.type === 'expense').sort((a,b) => a.code.localeCompare(b.code));
  const rev   = totalRevenue();
  const exp   = totalExpenses();
  const net   = rev - exp;
  const isPos = net >= 0;

  const revRows = revenues.map(a => `
    <div class="report-row">
      <span>${escHtml(a.name)}</span>
      <span>${fmt(getBalance(a.id))}</span>
    </div>
  `).join('') || '<div class="report-row"><span style="color:#94a3b8">No revenue accounts</span><span>—</span></div>';

  const expRows = expenses.map(a => `
    <div class="report-row">
      <span>${escHtml(a.name)}</span>
      <span>${fmt(getBalance(a.id))}</span>
    </div>
  `).join('') || '<div class="report-row"><span style="color:#94a3b8">No expense accounts</span><span>—</span></div>';

  return `
    <div class="card report-section">
      <div class="section-title" style="margin-bottom:14px">Profit & Loss Statement</div>
      <div style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
        <div class="report-section-title">Revenue</div>
        ${revRows}
        <div class="report-row total-row"><span>Total Revenue</span><span style="color:#059669">${fmt(rev)}</span></div>
        <div class="report-section-title">Expenses</div>
        ${expRows}
        <div class="report-row total-row"><span>Total Expenses</span><span style="color:#dc2626">${fmt(exp)}</span></div>
        <div class="report-row grand-total ${isPos ? 'green' : 'red'}">
          <span>Net ${isPos ? 'Profit' : 'Loss'}</span>
          <span>${fmt(Math.abs(net))}</span>
        </div>
      </div>
    </div>
  `;
}

function renderBalanceSheet() {
  const assets  = db.accounts.filter(a => a.type === 'asset').sort((a,b) => a.code.localeCompare(b.code));
  const liabs   = db.accounts.filter(a => a.type === 'liability').sort((a,b) => a.code.localeCompare(b.code));
  const equities = db.accounts.filter(a => a.type === 'equity').sort((a,b) => a.code.localeCompare(b.code));

  const totA = totalAssets();
  const totL = totalLiab();
  const totE = totalEquity();
  const net  = netIncome();
  const totLE = totL + totE + net;

  const mkRows = (accs) => accs.map(a => `
    <div class="report-row"><span>${escHtml(a.name)}</span><span>${fmt(getBalance(a.id))}</span></div>
  `).join('') || '<div class="report-row"><span style="color:#94a3b8">None</span><span>—</span></div>';

  return `
    <div class="card report-section">
      <div class="section-title" style="margin-bottom:14px">Balance Sheet</div>
      <div style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
        <div class="report-section-title">Assets</div>
        ${mkRows(assets)}
        <div class="report-row total-row"><span>Total Assets</span><span style="color:#1d4ed8">${fmt(totA)}</span></div>
        <div class="report-section-title">Liabilities</div>
        ${mkRows(liabs)}
        <div class="report-row total-row"><span>Total Liabilities</span><span style="color:#dc2626">${fmt(totL)}</span></div>
        <div class="report-section-title">Equity</div>
        ${mkRows(equities)}
        <div class="report-row"><span>Net Income (Current)</span><span style="color:${net>=0?'#059669':'#dc2626'}">${fmt(net)}</span></div>
        <div class="report-row total-row"><span>Total Equity</span><span style="color:#7c3aed">${fmt(totE + net)}</span></div>
        <div class="report-row grand-total">
          <span>Liabilities + Equity</span>
          <span>${fmt(totLE)}</span>
        </div>
      </div>
    </div>
  `;
}

function renderLedger() {
  const txns = [...db.transactions].sort((a,b) => b.date.localeCompare(a.date));
  return `
    <div class="card">
      <div class="section-title" style="margin-bottom:14px">General Ledger</div>
      ${txns.length === 0
        ? '<p style="color:#94a3b8;font-size:13px">No transactions recorded.</p>'
        : `<div class="table-wrap"><table>
          <thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Debit Account</th><th>Credit Account</th><th class="text-right">Amount</th></tr></thead>
          <tbody>
            ${txns.map(t => {
              const from = getAccount(t.fromAccountId);
              const to   = getAccount(t.toAccountId);
              // Debit = toAccountId for income/transfer; fromAccountId for expense
              const debit  = t.type === 'expense' ? from : to;
              const credit = t.type === 'expense' ? to   : from;
              return `<tr>
                <td class="text-muted" style="white-space:nowrap">${fmtDate(t.date)}</td>
                <td>${escHtml(t.description)}</td>
                <td><span class="badge badge-${t.type}">${t.type}</span></td>
                <td class="text-muted">${debit  ? escHtml(debit.name)  : '—'}</td>
                <td class="text-muted">${credit ? escHtml(credit.name) : '—'}</td>
                <td class="fw-600 text-right">${fmt(t.amount)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table></div>`}
    </div>
  `;
}

function getProjectName(id) {
  if (!id) return '';
  if (!db.projects) return '';
  const p = db.projects.find(p => p.id === +id);
  return p ? p.name : '';
}

function projectIncome(pid) {
  return db.transactions.filter(t => t.projectId === +pid && t.type === 'income').reduce((s,t) => s + t.amount, 0);
}

function projectExpenses(pid) {
  return db.transactions.filter(t => t.projectId === +pid && t.type === 'expense').reduce((s,t) => s + t.amount, 0);
}

function projectInvoiceTotal(pid) {
  return db.invoices.filter(i => i.projectId === +pid).reduce((s,i) => s + invTotal(i), 0);
}

function renderProjects() {
  if (!db.projects) db.projects = [];
  const projects = [...db.projects].sort((a,b) => {
    if (a.status === 'active' && b.status !== 'active') return -1;
    if (a.status !== 'active' && b.status === 'active') return 1;
    return a.name.localeCompare(b.name);
  });

  document.getElementById('main-content').innerHTML = `
    <div class="section-header">
      <div>
        <div class="section-title">Projects</div>
        <div class="section-sub">${projects.length} project${projects.length!==1?'s':''}</div>
      </div>
      <button class="btn btn-primary" onclick="showAddProject()">+ New Project</button>
    </div>
    ${projects.length === 0
      ? `<div class="card">
          <div class="empty-state">
            <div class="empty-icon">📁</div>
            <div class="empty-title">No projects yet</div>
            <div class="empty-text">Create projects to track income, expenses, and invoices for clients.</div>
            <button class="btn btn-primary" onclick="showAddProject()">+ New Project</button>
          </div>
        </div>`
      : `<div class="project-cards">
          ${projects.map(p => {
            const inc = projectIncome(p.id);
            const exp = projectExpenses(p.id);
            const net = inc - exp;
            const txCount = db.transactions.filter(t => t.projectId === p.id).length;
            const invCount = db.invoices.filter(i => i.projectId === p.id).length;
            return `<div class="project-card" onclick="viewProject(${p.id})">
              <div class="project-card-header">
                <div class="project-card-name">${escHtml(p.name)}</div>
                <span class="badge badge-${p.status}">${p.status}</span>
              </div>
              ${p.client ? `<div class="project-card-client">${escHtml(p.client)}</div>` : ''}
              <div class="project-card-stats">
                <div class="project-card-stat">
                  <div class="project-card-stat-label">Income</div>
                  <div class="project-card-stat-value" style="color:#059669">${fmt(inc)}</div>
                </div>
                <div class="project-card-stat">
                  <div class="project-card-stat-label">Expenses</div>
                  <div class="project-card-stat-value" style="color:#dc2626">${fmt(exp)}</div>
                </div>
                <div class="project-card-stat">
                  <div class="project-card-stat-label">Profit</div>
                  <div class="project-card-stat-value" style="color:${net >= 0 ? '#059669' : '#dc2626'}">${fmt(net)}</div>
                </div>
              </div>
              <div style="margin-top:10px;font-size:12px;color:#94a3b8;">${txCount} transaction${txCount!==1?'s':''} · ${invCount} invoice${invCount!==1?'s':''}</div>
            </div>`;
          }).join('')}
        </div>`}
  `;
}

function showAddProject() {
  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">New Project</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Project Name</label>
            <input type="text" id="p-name" placeholder="e.g. Website Redesign">
          </div>
          <div class="form-group">
            <label>Client <span style="font-weight:400;color:#94a3b8;text-transform:none">(optional)</span></label>
            <input type="text" id="p-client" placeholder="e.g. Acme Corp">
          </div>
          <div class="form-group">
            <label>Description <span style="font-weight:400;color:#94a3b8;text-transform:none">(optional)</span></label>
            <textarea id="p-desc" placeholder="Brief description of the project"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="addProject()">Create Project</button>
        </div>
      </div>
    </div>
  `);
  document.getElementById('p-name').focus();
}

function addProject() {
  if (!db.projects) db.projects = [];
  if (!db.nextId.project) db.nextId.project = 1;
  const name = document.getElementById('p-name').value.trim();
  const client = document.getElementById('p-client').value.trim();
  const desc = document.getElementById('p-desc').value.trim();
  if (!name) return alert('Please enter a project name.');
  db.projects.push({ id: nextId('project'), name, client, description: desc, status: 'active' });
  saveDB();

function saveProject(id) {
  const p = db.projects.find(p => p.id === +id);
  if (!p) return;
  const name = document.getElementById('ep-name').value.trim();
  if (!name) return alert('Please enter a project name.');
  p.name = name;
  p.client = document.getElementById('ep-client').value.trim();
  p.description = document.getElementById('ep-desc').value.trim();
  p.status = document.getElementById('ep-status').value;
  saveDB();
  closeModal();
  viewProject(id);
}

function deleteProject(id) {
  const txCount = db.transactions.filter(t => t.projectId === +id).length;
  const invCount = db.invoices.filter(i => i.projectId === +id).length;
  let msg = 'Delete this project?';
  if (txCount || invCount) {
    msg += `\n\nThis will unlink ${txCount} transaction${txCount!==1?'s':''} and ${invCount} invoice${invCount!==1?'s':''} from this project. The transactions and invoices themselves will NOT be deleted.`;
  }
  if (!confirm(msg)) return;
  // Unlink transactions and invoices
  db.transactions.forEach(t => { if (t.projectId === +id) delete t.projectId; });
  db.invoices.forEach(i => { if (i.projectId === +id) delete i.projectId; });
  db.projects = db.projects.filter(p => p.id !== +id);
  saveDB();
  renderProjects();
}

// Shows a thumbnail preview inside the upload zone while the user is filling the form
function previewReceipt(inputId, thumbId, textId) {
  const file = document.getElementById(inputId).files[0];
  if (!file) return;
  const thumb = document.getElementById(thumbId);
  const text  = document.getElementById(textId);
  text.textContent = file.name;
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (e) => { thumb.src = e.target.result; thumb.style.display = 'block'; };
    reader.readAsDataURL(file);
  } else {
    thumb.style.display = 'none';
  }
}

// Opens a modal to attach a receipt to an existing transaction
function attachReceipt(id) {
  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Attach Receipt</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>Receipt File</label>
            <div class="receipt-upload" onclick="document.getElementById('ar-file').click()" id="ar-zone">
              <div class="receipt-upload-text" id="ar-text">📎 <strong>Click to upload</strong> a receipt image or PDF</div>
              <img class="receipt-preview-thumb" id="ar-thumb">
              <input type="file" id="ar-file" accept="image/*,application/pdf" onchange="previewReceipt('ar-file','ar-thumb','ar-text')">
            </div>
            <div class="form-hint">Images (JPG, PNG, GIF, WebP) or PDF · Max 5 MB</div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveAttachedReceipt(${id})">Attach Receipt</button>
        </div>
      </div>
    </div>
  `);
}

// Saves the selected file to an existing transaction
function saveAttachedReceipt(id) {
  const input = document.getElementById('ar-file');
  const file  = input && input.files[0];
  if (!file) return alert('Please select a file.');
  if (file.size > 5 * 1024 * 1024) return alert('File is too large. Maximum size is 5 MB.');
  const tx = db.transactions.find(t => t.id === +id);
  if (!tx) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    tx.receiptData = e.target.result;
    tx.receiptName = file.name;
    tx.receiptType = file.type;
    saveDB();
    closeModal();
    renderTransactions();
  };
  reader.readAsDataURL(file);
}

// Removes the receipt from a transaction
function removeReceipt(id) {
  if (!confirm('Remove this receipt?')) return;
  const tx = db.transactions.find(t => t.id === +id);
  if (tx) {
    delete tx.receiptData;
    delete tx.receiptName;
    delete tx.receiptType;
    saveDB();
  }
  closeModal();
  renderTransactions();
}

               </div>`}
          <div class="form-group">

          </div>
          <div class="form-group">
            <label>Gist ID <span style="font-weight:400;text-transform:none;color:#94a3b8">(leave blank on first device — auto-created)</span></label>
            <input type="text" id="cloud-gist" value="${escHtml(_cloudGistId)}" placeholder="Auto-discovered or created on connect" style="font-family:monospace;font-size:12px;">
            <div class="form-hint">On a second device: enter your token + the Gist ID shown above, then click Connect.</div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          ${_cloudMode ? `<button class="btn btn-danger" onclick="disconnectCloud()">Disconnect</button>` : ''}
          <button class="btn btn-primary" id="cloud-connect-btn" onclick="connectCloud()">${_cloudMode ? 'Reconnect' : 'Connect & Sync'}</button>
        </div>
      </div>
    </div>

  document.getElementById('cloud-pat').focus();

async function connectCloud() {
  const pat    = document.getElementById('cloud-pat').value.trim();
  const gistId = document.getElementById('cloud-gist').value.trim();
  if (!pat) return alert('Please enter your GitHub Personal Access Token.');

  const btn = document.getElementById('cloud-connect-btn');
  if (btn) { btn.textContent = 'Connecting…'; btn.disabled = true; }

  try {
    let resolvedId = gistId;

    // Search for existing gist if no ID provided
    if (!resolvedId) {
      const res = await fetch('https://api.github.com/gists?per_page=100', {
        headers: { 'Authorization': `Bearer ${pat}`, 'Accept': 'application/vnd.github+json' }
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.message || `GitHub error ${res.status}`); }
      const list  = await res.json();
      const found = list.find(g => g.description === 'Common Cents Data' && g.files?.['data.json']);
      if (found) resolvedId = found.id;
    }

    let cloudData = null;

    if (resolvedId) {
      // Load existing gist
      const res = await fetch(`https://api.github.com/gists/${resolvedId}`, {
        headers: { 'Authorization': `Bearer ${pat}`, 'Accept': 'application/vnd.github+json' }
      });
      if (!res.ok) throw new Error(`Could not read gist (${res.status})`);
      const gist = await res.json();
      const raw  = gist.files?.['data.json']?.content;
      if (raw) cloudData = JSON.parse(raw);
    } else {
      // No existing gist — create one with current local data
      const res = await fetch('https://api.github.com/gists', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${pat}`,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          description: 'Common Cents Data',
          public: false,
          files: { 'data.json': { content: JSON.stringify(db) } }
        })
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.message || `Failed to create gist (${res.status})`); }
      const gist = await res.json();
      resolvedId = gist.id;
    }

    // Persist credentials on this device
    localStorage.setItem('cc_cloud_pat',     pat);
    localStorage.setItem('cc_cloud_gist_id', resolvedId);
    _cloudPAT    = pat;
    _cloudGistId = resolvedId;
    _cloudMode   = true;
    _serverMode  = false;

    // Use cloud data if it exists
    if (cloudData) {
      db = cloudData;
      localStorage.setItem('cc_data_v2', JSON.stringify(cloudData));
    } else {
      saveDB(); // push current local data to the new gist
    }

    closeModal();
    updateSyncBadge();
    const renders = { dashboard: renderDashboard, accounts: renderAccounts, transactions: renderTransactions, invoices: renderInvoices, projects: renderProjects, reports: renderReports };
    if (renders[currentPage]) renders[currentPage]();

  } catch (err) {
    alert(`Connection failed: ${err.message}\n\nMake sure:\n• The token has the "gist" scope\n• You are connected to the internet`);
    if (btn) { btn.textContent = _cloudMode ? 'Reconnect' : 'Connect & Sync'; btn.disabled = false; }
  }
}

function disconnectCloud() {
  if (!confirm('Disconnect cloud sync on this device?\n\nYour local data and the cloud gist are kept — nothing is deleted.')) return;
  localStorage.removeItem('cc_cloud_pat');
  localStorage.removeItem('cc_cloud_gist_id');
  _cloudPAT    = '';
  _cloudGistId = '';
  _cloudMode   = false;
  closeModal();
  updateSyncBadge();
}

function updateSyncBadge() {
  const badge = document.getElementById('sync-badge');
  if (!badge) return;
  if (_cloudMode) {
    badge.innerHTML = '<span style="display:inline-flex;align-items:center;gap:4px;background:#eff6ff;color:#1d4ed8;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;" title="Cloud sync active — click to manage" onclick="showCloudSettings()">☁️ Cloud</span>';
  } else if (_serverMode) {
    badge.innerHTML = '<span style="display:inline-flex;align-items:center;gap:4px;background:#d1fae5;color:#059669;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;" title="Data shared across all devices on your network">🌐 Network</span>';
  } else {
    badge.innerHTML = '<span style="display:inline-flex;align-items:center;gap:4px;background:#f1f5f9;color:#64748b;padding:2px 9px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;" title="Local only — click to set up cloud sync" onclick="showCloudSettings()">💾 Local</span>';
  }
}

<head>
<meta charset="UTF-8">
<title>Invoice #${num} — ${e(inv.client)}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px;color:#1e293b;background:#fff;padding:48px;max-width:820px;margin:0 auto;}
.header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;gap:20px;}
.biz-name{font-size:20px;font-weight:800;color:#1e293b;margin-bottom:5px;}
.biz-details{font-size:12px;color:#64748b;line-height:1.7;}
.inv-right{text-align:right;flex-shrink:0;}
.inv-title{font-size:36px;font-weight:900;color:#2563eb;letter-spacing:-1.5px;line-height:1;}
.inv-num{font-size:14px;color:#64748b;margin-top:5px;}
.inv-status{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;background:${statusBg};color:${statusColor};margin-top:8px;}
.meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;padding:18px 20px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;gap:20px;}
.bill-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#94a3b8;margin-bottom:6px;}
.client-name{font-size:16px;font-weight:700;}
.client-email{font-size:12px;color:#64748b;margin-top:3px;}
.dates{text-align:right;flex-shrink:0;}
.date-row{font-size:12px;margin-bottom:5px;}
.date-lbl{color:#64748b;}
.date-val{font-weight:600;color:#1e293b;margin-left:6px;}
.items-wrap{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;margin-bottom:20px;}
table{width:100%;border-collapse:collapse;}
thead th{background:#f8fafc;padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#64748b;border-bottom:1px solid #e2e8f0;}
tbody td{padding:11px 14px;border-bottom:1px solid #f1f5f9;vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tfoot{border-top:2px solid #e2e8f0;background:#f8fafc;}
tfoot td{padding:13px 14px;}
.td-desc{}
.td-center{text-align:center;}
.td-right{text-align:right;}
.td-bold{font-weight:700;}
.total-lbl{text-align:right;font-weight:600;color:#64748b;font-size:12px;text-transform:uppercase;letter-spacing:.05em;}
.total-val{text-align:right;font-size:22px;font-weight:900;color:#059669;}
.notes{padding:14px 16px;background:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;font-size:12px;color:#475569;line-height:1.6;margin-bottom:20px;}
.notes-lbl{font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#94a3b8;margin-bottom:6px;}
.footer{margin-top:40px;padding-top:16px;border-top:1px solid #e2e8f0;text-align:center;font-size:11px;color:#94a3b8;}
@media print{body{padding:0;}@page{margin:15mm;size:A4;}}
</style>
</head>
<body>

<div class="header">
  <div>${bizBlock}</div>
  <div class="inv-right">
    <div class="inv-title">INVOICE</div>
    <div class="inv-num">#${num}</div>
    <div class="inv-status">${e(inv.status)}</div>
  </div>
</div>

<div class="meta">
  <div>
    <div class="bill-label">Bill To</div>
    <div class="client-name">${e(inv.client)}</div>
    ${inv.clientEmail ? `<div class="client-email">${e(inv.clientEmail)}</div>` : ''}
  </div>
  <div class="dates">
    <div class="date-row"><span class="date-lbl">Invoice Date:</span><span class="date-val">${e(inv.date ? (()=>{const [y,m,d]=inv.date.split('-');return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+ +d+', '+y;})() : '')}</span></div>
    ${inv.dueDate ? `<div class="date-row"><span class="date-lbl">Due Date:</span><span class="date-val">${(()=>{const [y,m,d]=inv.dueDate.split('-');return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+ +d+', '+y;})()} </span></div>` : ''}
  </div>
</div>

<div class="items-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:50%">Description</th>
        <th style="width:12%;text-align:center">Qty</th>
        <th style="width:19%;text-align:right">Rate</th>
        <th style="width:19%;text-align:right">Amount</th>
      </tr>
    </thead>
    <tbody>${itemRows}</tbody>
    <tfoot>
      <tr>
        <td colspan="3" class="total-lbl">Total</td>
        <td class="total-val">${fmt(total)}</td>
      </tr>
    </tfoot>
  </table>
</div>

${inv.notes ? `<div class="notes"><div class="notes-lbl">Notes &amp; Terms</div>${e(inv.notes)}</div>` : ''}

<div class="footer">
  Generated by Common Cents &nbsp;·&nbsp; ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}
</div>

<script>window.onload=()=>{window.print();}<\/script>
</body>
</html>`;

  const w = window.open('', '_blank', 'width=920,height=750');
  if (!w) { alert('Pop-ups are blocked.\nPlease allow pop-ups for this page, then try again.'); return; }
  w.document.write(html);
  w.document.close();
}

// ═══════════════════════════════════════════════════════════
// SIDEBAR TOGGLE
// ═════════════════════════════════════════════════════════
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const btn = document.getElementById('sidebar-toggle-btn');
  const collapsed = sidebar.classList.toggle('collapsed');
  btn.innerHTML = collapsed ? '&#9654;' : '&#9776;';
  btn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
  localStorage.setItem('cc_sidebar_collapsed', collapsed ? '1' : '0');
}

// ═════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════

// Set date in topbar immediately (doesn't need data)
const now = new Date();
document.getElementById('topbar-date').textContent =
  now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

// Load data, then render
loadDB().then(() => {
  updateSyncBadge();
  // Restore sidebar state
  if (localStorage.getItem('cc_sidebar_collapsed') === '1') {
    const sb = document.getElementById('sidebar');
    const tbtn = document.getElementById('sidebar-toggle-btn');
    if (sb) sb.classList.add('collapsed');
    if (tbtn) { tbtn.innerHTML = '&#9654;'; tbtn.title = 'Expand sidebar'; }
  }
  renderDashboard();
});
</script>
</body>
</html>
