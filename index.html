function setEstStatus(id, status) {
  const e = db.estimates.find(x => x.id === +id); if (e) { e.status = status; saveDB(); }
}

function deleteEstimate(id) {
  if (!canDelete()) return alert('Only administrators can delete records.');
  if (!confirm('Delete this estimate?')) return;
  db.estimates = db.estimates.filter(e => e.id !== +id);
  saveDB(); renderEstimates();
}

function convertEstimateToInvoice(id) {
  const e = db.estimates.find(x => x.id === +id); if (!e) return;
  if (!confirm(`Convert estimate #EST-${String(e.id).padStart(4,'0')} to an invoice?`)) return;
  db.invoices.push({ id: nextId('invoice'), client: e.client, clientEmail: e.clientEmail, date: todayStr(), dueDate: '', items: JSON.parse(JSON.stringify(e.items)), taxRate: e.taxRate||0, status: 'draft', notes: e.notes });
  e.status = 'accepted';
  saveDB(); closeModal(); navigate('invoices');
}

function renderBills() {
  const today = todayStr();
  let changed = false;
  for (const b of db.bills) {
    if (b.status === 'unpaid' && b.dueDate && b.dueDate < today) { b.overdue = true; changed = true; }
    else { b.overdue = false; }
  }
  if (changed) saveDB();

  const bills = [...db.bills].sort((a,b) => (a.dueDate||'').localeCompare(b.dueDate||''));
  const totalUnpaid = db.bills.filter(b=>b.status==='unpaid').reduce((s,b)=>s+b.amount,0);
  const totalOverdue = db.bills.filter(b=>b.status==='unpaid'&&b.overdue).reduce((s,b)=>s+b.amount,0);

  document.getElementById('main-content').innerHTML = `
    <div class="section-header">
      <div><div class="section-title">Bills</div><div class="section-sub">Accounts Payable</div></div>
      <button class="btn btn-primary" onclick="showAddBill()">+ Enter Bill</button>
    </div>
    <div class="stats-grid" style="margin-bottom:16px;">
      <div class="stat-card"><div class="stat-label">Total Unpaid</div><div class="stat-value amber">${fmt(totalUnpaid)}</div></div>
      <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-value red">${fmt(totalOverdue)}</div></div>
    </div>
    <div class="card">
      ${bills.length === 0
        ? `<div class="empty-state"><div class="empty-icon">🧾</div><div class="empty-title">No bills yet</div><div class="empty-text">Enter bills from vendors to track what you owe.</div><button class="btn btn-primary" onclick="showAddBill()">+ Enter Bill</button></div>`
        : `<div class="table-wrap"><table>
          <thead><tr><th>Vendor</th><th>Description</th><th>Bill Date</th><th>Due Date</th><th class="text-right">Amount</th><th>Status</th><th></th></tr></thead>
          <tbody>${bills.map(b => {
            const statusLabel = b.status==='paid' ? 'paid' : b.overdue ? 'overdue' : 'unpaid';
            const statusBadge = b.status==='paid' ? 'paid' : b.overdue ? 'overdue' : 'unpaid';
            return `<tr>
              <td class="fw-600">${escHtml(b.vendor)}</td>
              <td class="text-muted">${escHtml(b.description||'')}</td>
              <td class="text-muted">${fmtDate(b.date)}</td>
              <td class="text-muted">${fmtDate(b.dueDate)}</td>
              <td class="fw-600 text-right">${fmt(b.amount)}</td>
              <td><span class="badge badge-${statusBadge}">${statusLabel}</span></td>
              <td style="display:flex;gap:4px;justify-content:flex-end;">
                ${b.status==='unpaid'?`<button class="btn btn-xs btn-success" onclick="payBill(${b.id})">Pay Bill</button>`:''}
                <button class="btn btn-xs btn-danger" onclick="deleteBill(${b.id})">Delete</button>
              </td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`}
    </div>`;
}

function showAddBill() {
  const vendorOpts = ['<option value="">— Type name below —</option>',
    ...db.contacts.filter(c=>c.type==='vendor').map(c=>`<option value="${escHtml(c.name)}">${escHtml(c.name)}</option>`)
  ].join('');
  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal">
        <div class="modal-header"><div class="modal-title">Enter Bill</div><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label>Vendor (from contacts)</label>
              <select id="b-vendor-sel" onchange="if(this.value)document.getElementById('b-vendor').value=this.value">${vendorOpts}</select>
            </div>
            <div class="form-group"><label>Vendor Name</label><input type="text" id="b-vendor" placeholder="Acme Supplies"></div>
          </div>
          <div class="form-group"><label>Description</label><input type="text" id="b-desc" placeholder="Monthly rent, Office supplies..."></div>
          <div class="form-row">
            <div class="form-group"><label>Bill Date</label><input type="date" id="b-date" value="${todayStr()}"></div>
            <div class="form-group"><label>Due Date</label><input type="date" id="b-due"></div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Amount ($)</label>
              <input type="number" id="b-amount" placeholder="0.00" min="0.01" step="0.01">
            </div>
            <div class="form-group">
              <label>Expense Account</label>
              <select id="b-cat">${buildAccountOptions(['expense'])}</select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveBill()">Save Bill</button>
        </div>
      </div>
    </div>`);
  document.getElementById('b-vendor').focus();
}

function saveBill() {
  if (!canEdit()) return alert('You do not have permission to save bills.');
  const vendor = document.getElementById('b-vendor').value.trim();
  const desc   = document.getElementById('b-desc').value.trim();
  const date   = document.getElementById('b-date').value;
  const due    = document.getElementById('b-due').value;
  const amount = parseFloat(document.getElementById('b-amount').value);
  const catId  = parseInt(document.getElementById('b-cat').value);
  if (!vendor) return alert('Please enter a vendor name.');
  if (!date)   return alert('Please select a bill date.');
  if (isNaN(amount) || amount <= 0) return alert('Please enter a valid amount.');
  db.bills.push({ id: nextId('bill'), vendor, description: desc, date, dueDate: due, amount, categoryAccountId: catId, status: 'unpaid' });
  saveDB(); closeModal(); renderBills();
}

function deleteBill(id) {
  if (!canDelete()) return alert('Only administrators can delete records.');
  if (!confirm('Delete this bill?')) return;
  db.bills = db.bills.filter(b => b.id !== +id);
  saveDB(); renderBills();
}

function payBill(id) {
  const b = db.bills.find(x => x.id === +id); if (!b) return;
  const assetOpts = buildAccountOptions(['asset']);
  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal">
        <div class="modal-header"><div class="modal-title">Pay Bill — ${escHtml(b.vendor)}</div><button class="modal-close" onclick="closeModal()">×</button></div>
        <div class="modal-body">
          <p style="font-size:14px;color:#475569;margin-bottom:16px">Record payment of <strong>${fmt(b.amount)}</strong> for: ${escHtml(b.description||b.vendor)}</p>
          <div class="form-group"><label>Paid From Account</label><select id="bp-asset">${assetOpts}</select></div>
          <div class="form-group"><label>Payment Date</label><input type="date" id="bp-date" value="${todayStr()}"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-success" onclick="confirmPayBill(${id})">Record Payment</button>
        </div>
      </div>
    </div>`);
}

function confirmPayBill(id) {
  const b = db.bills.find(x => x.id === +id); if (!b) return;
  const assetId = parseInt(document.getElementById('bp-asset').value);
  const date    = document.getElementById('bp-date').value;
  if (!date) return alert('Please select a payment date.');
  db.transactions.push({
    id: nextId('transaction'), date, type: 'expense',
    description: `Bill payment — ${b.vendor}${b.description?' ('+b.description+')':''}`,
    amount: b.amount, fromAccountId: b.categoryAccountId, toAccountId: assetId
  });
  b.status = 'paid'; b.paidDate = date; b.paidAccountId = assetId;
  saveDB(); closeModal(); renderBills();
}

function recTypeChange() {
  const type = document.getElementById('r-type').value;
  const fl = document.getElementById('r-from-label'), tl = document.getElementById('r-to-label');
  const fs = document.getElementById('r-from'), ts = document.getElementById('r-to');
  if (type === 'income')   { fl.textContent='Revenue Account'; fs.innerHTML=buildAccountOptions(['revenue']); tl.textContent='Deposit To'; ts.innerHTML=buildAccountOptions(['asset']); }
  else if (type === 'expense') { fl.textContent='Expense Category'; fs.innerHTML=buildAccountOptions(['expense']); tl.textContent='Paid From'; ts.innerHTML=buildAccountOptions(['asset']); }
  else { fl.textContent='Transfer From'; fs.innerHTML=buildAccountOptions(['asset']); tl.textContent='Transfer To'; ts.innerHTML=buildAccountOptions(['asset']); }
}

function saveRecurring() {
  const desc   = document.getElementById('r-desc').value.trim();
  const type   = document.getElementById('r-type').value;
  const freq   = document.getElementById('r-freq').value;
  const fromId = parseInt(document.getElementById('r-from').value);
  const toId   = parseInt(document.getElementById('r-to').value);
  const amount = parseFloat(document.getElementById('r-amount').value);
  const next   = document.getElementById('r-next').value;
  if (!desc) return alert('Please enter a description.');
  if (isNaN(amount) || amount <= 0) return alert('Please enter a valid amount.');
  if (!next) return alert('Please select a start date.');
  db.recurring.push({ id: nextId('recurring'), type, description: desc, amount, fromAccountId: fromId, toAccountId: toId, frequency: freq, nextDate: next, active: true });
  saveDB(); closeModal(); renderRecurring();
}

function toggleRecurring(id, active) {
  const r = db.recurring.find(x => x.id === +id); if (r) { r.active = active; saveDB(); }
}

function deleteRecurring(id) {
  if (!confirm('Delete this recurring rule?')) return;
  db.recurring = db.recurring.filter(r => r.id !== +id);
  saveDB(); renderRecurring();
}

function runRecurringNow(id) {
  const r = db.recurring.find(x => x.id === +id); if (!r) return;
  db.transactions.push({ id: nextId('transaction'), date: todayStr(), type: r.type, description: r.description, amount: r.amount, fromAccountId: r.fromAccountId, toAccountId: r.toAccountId });
  r.nextDate = nextRecurringDate(r.nextDate, r.frequency);
  saveDB();
  alert(`Transaction recorded. Next date: ${fmtDate(r.nextDate)}`);
  renderRecurring();
}

function nextRecurringDate(dateStr, frequency) {
  const d = new Date(dateStr + 'T00:00:00');
  if (frequency === 'weekly')    d.setDate(d.getDate() + 7);
  else if (frequency === 'biweekly') d.setDate(d.getDate() + 14);
  else if (frequency === 'monthly')  d.setMonth(d.getMonth() + 1);
  else if (frequency === 'quarterly') d.setMonth(d.getMonth() + 3);
  else if (frequency === 'yearly')   d.setFullYear(d.getFullYear() + 1);
  return d.toISOString().split('T')[0];
}

function checkAndRunRecurring() {
  const today = todayStr();
  const due = db.recurring.filter(r => r.active !== false && r.nextDate && r.nextDate <= today);
  if (due.length === 0) return;
  const names = due.map(r => `• ${r.description} (${fmt(r.amount)})`).join('\n');
  if (!confirm(`${due.length} recurring transaction${due.length>1?'s are':' is'} due:\n\n${names}\n\nRecord ${due.length>1?'them':'it'} now?`)) return;
  for (const r of due) {
    db.transactions.push({ id: nextId('transaction'), date: today, type: r.type, description: r.description, amount: r.amount, fromAccountId: r.fromAccountId, toAccountId: r.toAccountId });
    r.nextDate = nextRecurringDate(r.nextDate, r.frequency);
  }
  saveDB();
}

function renderTrialBalance() {
  const accs = [...db.accounts].sort((a,b)=>a.code.localeCompare(b.code));
  let totalDebit = 0, totalCredit = 0;
  const rows = accs.map(a => {
    const bal = getBalance(a.id);
    // Normal debit accounts: asset, expense. Normal credit: liability, equity, revenue
    const isDebit = ['asset','expense'].includes(a.type);
    const debit  = (isDebit && bal > 0) || (!isDebit && bal < 0) ? Math.abs(bal) : 0;
    const credit = (!isDebit && bal > 0) || (isDebit && bal < 0) ? Math.abs(bal) : 0;
    totalDebit  += debit;
    totalCredit += credit;
    return `<tr>
      <td class="text-mono">${escHtml(a.code)}</td>
      <td class="fw-600">${escHtml(a.name)}</td>
      <td><span class="badge badge-${a.type}" style="font-size:10px;">${a.type}</span></td>
      <td class="text-right">${debit  ? fmt(debit)  : '—'}</td>
      <td class="text-right">${credit ? fmt(credit) : '—'}</td>
    </tr>`;
  }).join('');
  const balanced = Math.abs(totalDebit - totalCredit) < 0.01;
  return `<div class="card"><div class="section-title" style="margin-bottom:14px">Trial Balance</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Code</th><th>Account</th><th>Type</th><th class="text-right">Debit</th><th class="text-right">Credit</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot>
        <tr style="background:#1e293b;color:#fff;font-weight:700;">
          <td colspan="3" style="padding:10px 14px;">Totals</td>
          <td style="padding:10px 14px;text-align:right;">${fmt(totalDebit)}</td>
          <td style="padding:10px 14px;text-align:right;">${fmt(totalCredit)}</td>
        </tr>
      </tfoot>
    </table></div>
    <div style="margin-top:10px;font-size:13px;${balanced?'color:#059669;':'color:#dc2626;'}font-weight:600;">
      ${balanced ? '✓ Books are balanced' : '⚠ Imbalance detected — debits and credits do not match'}
    </div>
  </div>`;
}

function renderCashFlow() {
  // Simple indirect method cash flow
  const net = netIncome();
  // Operating: net income ± A/R changes (invoices unpaid = receivable increase = negative cash)
  const arPending = db.invoices.filter(i=>['sent','overdue'].includes(i.status)).reduce((s,i)=>s+invTotal(i),0);
  const apPending = db.bills.filter(b=>b.status==='unpaid').reduce((s,b)=>s+b.amount,0);
  const cashFromOps = net - arPending + apPending;
  // Financing: equity accounts movement
  const totalEquityAcc = totalEquity();

  const mkRow = (label, val, indent) => `<div class="report-row" style="${indent?'padding-left:28px':''}"><span>${label}</span><span style="color:${val>=0?'#059669':'#dc2626'}">${val>=0?'+':''}${fmt(val)}</span></div>`;

  return `<div class="card"><div class="section-title" style="margin-bottom:14px">Cash Flow Statement</div>
    <div style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">
      <div class="report-section-title">Operating Activities</div>
      ${mkRow('Net Income', net, true)}
      ${mkRow('Change in Accounts Receivable', -arPending, true)}
      ${mkRow('Change in Accounts Payable', apPending, true)}
      <div class="report-row total-row"><span>Net Cash from Operations</span><span style="color:${cashFromOps>=0?'#059669':'#dc2626'}">${fmt(cashFromOps)}</span></div>
      <div class="report-section-title">Financing Activities</div>
      ${mkRow("Owner's Equity / Retained Earnings", totalEquityAcc, true)}
      <div class="report-row total-row"><span>Net Cash from Financing</span><span>${fmt(totalEquityAcc)}</span></div>
      <div class="report-row grand-total ${cashFromOps+totalEquityAcc>=0?'green':'red'}">
        <span>Net Change in Cash</span><span>${fmt(cashFromOps + totalEquityAcc)}</span>
      </div>
    </div>
    <p style="font-size:11px;color:#94a3b8;margin-top:10px;">Simplified indirect method. Consult an accountant for GAAP-compliant statements.</p>
  </div>`;
}

function renderARAgeing() {
  const today = new Date(todayStr());

  const buckets = { current:[], d30:[], d60:[], d90:[] };
  for (const inv of unpaid) {
    const due = inv.dueDate ? new Date(inv.dueDate) : null;
    const days = due ? Math.floor((today - due) / 86400000) : 0;
    if (!due || days <= 0)   buckets.current.push({inv,days:0});
    else if (days <= 30)     buckets.d30.push({inv,days});
    else if (days <= 60)     buckets.d60.push({inv,days});

function showCSVImport() { navigate('import'); }

function previewCSV(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const rows = parseCSV(e.target.result);
    if (rows.length < 2) { document.getElementById('csv-preview').innerHTML = '<p style="color:#dc2626">Could not parse CSV — make sure it has a header row.</p>'; return; }
    const headers = rows[0];
    const preview = document.getElementById('csv-preview');
    const opts = headers.map((h,i) => `<option value="${i}">${escHtml(h)}</option>`).join('');
    const blankOpt = '<option value="-1">— skip —</option>';

    // Guess column indices
    const gi = (keywords) => { const i = headers.findIndex(h => keywords.some(k => h.toLowerCase().includes(k))); return i >= 0 ? i : -1; };
    const dateIdx   = gi(['date']);
    const descIdx   = gi(['desc','memo','narration','payee','name','detail']);
    const amtIdx    = gi(['amount','debit','credit','sum','value']);

    preview.innerHTML = `
      <hr class="divider">
      <p style="font-size:13px;color:#475569;margin-bottom:12px;">Map your CSV columns (${rows.length-1} rows detected):</p>
      <div class="form-row-3" style="margin-bottom:14px;">
        <div class="form-group"><label>Date Column</label><select id="ci-date">${blankOpt}${opts}</select></div>
        <div class="form-group"><label>Description Column</label><select id="ci-desc">${blankOpt}${opts}</select></div>
        <div class="form-group"><label>Amount Column</label><select id="ci-amt">${blankOpt}${opts}</select></div>
      </div>
      <div class="form-row" style="margin-bottom:14px;">
        <div class="form-group">
          <label>Transaction Type</label>
          <select id="ci-type">
            <option value="expense">Expense (negative = money out)</option>
            <option value="income">Income (positive = money in)</option>
            <option value="auto">Auto-detect (positive=income, negative=expense)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Default Asset Account</label>
          <select id="ci-asset">${buildAccountOptions(['asset'])}</select>
        </div>
      </div>
      <div class="form-row" style="margin-bottom:14px;">
        <div class="form-group"><label>Default Expense Account</label><select id="ci-expense">${buildAccountOptions(['expense'])}</select></div>
        <div class="form-group"><label>Default Revenue Account</label><select id="ci-revenue">${buildAccountOptions(['revenue'])}</select></div>
      </div>
      <div style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;margin-bottom:14px;">
        <table><thead><tr>${headers.map(h=>`<th>${escHtml(h)}</th>`).join('')}</tr></thead>
        <tbody>${rows.slice(1,6).map(r=>`<tr>${r.map(c=>`<td class="text-muted">${escHtml(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>
      </div>
      <button class="btn btn-primary" onclick="importCSVData(${JSON.stringify(rows.slice(1)).replace(/</g,'\\u003c')})">Import ${rows.length-1} Transactions</button>`;

    // Apply guesses
    if (dateIdx >= 0) document.getElementById('ci-date').value = dateIdx;
    if (descIdx >= 0) document.getElementById('ci-desc').value = descIdx;
    if (amtIdx  >= 0) document.getElementById('ci-amt').value  = amtIdx;
  };
  reader.readAsText(file);
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split(/\r?\n/);
  for (const line of lines) {
    if (!line.trim()) continue;
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else { inQ = !inQ; } }
      else if (ch === ',' && !inQ) { cells.push(cur.trim()); cur = ''; }
      else { cur += ch; }
    }
    cells.push(cur.trim());
    rows.push(cells);
  }
  return rows;
}

function importCSVData(rows) {
  const di    = parseInt(document.getElementById('ci-date').value);
  const desi  = parseInt(document.getElementById('ci-desc').value);
  const ai    = parseInt(document.getElementById('ci-amt').value);
  const txType = document.getElementById('ci-type').value;
  const assetId   = parseInt(document.getElementById('ci-asset').value);
  const expenseId = parseInt(document.getElementById('ci-expense').value);
  const revenueId = parseInt(document.getElementById('ci-revenue').value);

  if (di < 0 || desi < 0 || ai < 0) return alert('Please map the Date, Description, and Amount columns.');

  let imported = 0, skipped = 0;
  for (const row of rows) {
    const rawDate = row[di]?.trim();
    const desc    = row[desi]?.trim();
    const rawAmt  = row[ai]?.trim().replace(/[$,\s]/g,'');
    const amount  = parseFloat(rawAmt);

    if (!rawDate || !desc || isNaN(amount) || amount === 0) { skipped++; continue; }

    // Normalise date to YYYY-MM-DD
    let date = rawDate;
    const m = rawDate.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if (m) { const y = m[3].length===2?'20'+m[3]:m[3]; date = `${y}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`; }

    let type, fromId, toId;
    if (txType === 'auto') {
      type = amount >= 0 ? 'income' : 'expense';
    } else {
      type = txType;
    }
    if (type === 'income')  { fromId = revenueId; toId = assetId; }
    else                    { fromId = expenseId; toId = assetId; }

    db.transactions.push({ id: nextId('transaction'), date, type, description: desc, amount: Math.abs(amount), fromAccountId: fromId, toAccountId: toId });
    imported++;
  }

  saveDB();
  alert(`Imported ${imported} transaction${imported!==1?'s':''}${skipped?`, skipped ${skipped} invalid rows`:''}.`);
  navigate('transactions');
}

}

function isAdmin()   { return currentUser?.role === 'admin'; }
function canEdit()   { return currentUser?.role === 'admin' || currentUser?.role === 'accountant'; }
function canDelete() { return currentUser?.role === 'admin'; }

function setUserUI(user) {
  document.getElementById('current-user-name').textContent = user.name;
  document.getElementById('user-avatar').textContent = user.name.charAt(0).toUpperCase();
}

function login() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const user = loadUsers().find(u => u.username === username && u.password === password);
  if (!user) {
    const el = document.getElementById('login-error');
    el.textContent = 'Invalid username or password.';
    el.style.display = 'block';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
    return;
  }
  currentUser = user;
  sessionStorage.setItem(CC_SESSION_KEY, JSON.stringify({ id: user.id, username: user.username }));
  document.getElementById('login-screen').style.display = 'none';
  setUserUI(user);
  loadDB().then(() => {
    updateSyncBadge();
    checkAndRunRecurring();
    renderDashboard();
    if (_cloudMode) startCloudPolling();
  });
}

function logout() {
  if (!confirm('Sign out?')) return;
  currentUser = null;
  sessionStorage.removeItem(CC_SESSION_KEY);
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('main-content').innerHTML = '';
  setTimeout(() => document.getElementById('login-user').focus(), 50);
}

function renderUsers() {
  const users = loadUsers();
  const roleColor = { admin: '#2563eb', accountant: '#059669', viewer: '#64748b' };
  const roleDesc  = { admin: 'Full access + user management', accountant: 'Add & edit, no deletes', viewer: 'Read-only' };
  document.getElementById('main-content').innerHTML = `
    <div class="section-header">
      <div><div class="section-title">Users</div><div class="section-sub">${users.length} user${users.length!==1?'s':''}</div></div>
      ${isAdmin() ? `<button class="btn btn-primary" onclick="showAddUser()">+ New User</button>` : ''}
    </div>
    ${!isAdmin() ? `<div class="card"><div style="padding:8px 0;text-align:center;color:#64748b;font-size:13px;">Only administrators can manage users.</div></div>` : ''}
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Created</th><th></th></tr></thead>
          <tbody>
            ${users.map(u => `<tr>
              <td style="font-weight:600;">${escHtml(u.name)}</td>
              <td class="text-mono">${escHtml(u.username)}</td>
              <td>
                <span class="badge" style="background:${roleColor[u.role]}22;color:${roleColor[u.role]};">${u.role}</span>
                <span style="font-size:11px;color:#94a3b8;margin-left:6px;">${roleDesc[u.role]||''}</span>
              </td>
              <td class="text-muted">${fmtDate(u.created||'')}</td>
              <td style="text-align:right;white-space:nowrap;">
                ${isAdmin() ? `<button class="btn btn-sm btn-secondary" onclick="showEditUser(${u.id})">Edit</button>` : ''}
                ${isAdmin() && u.id !== currentUser.id ? `<button class="btn btn-sm btn-danger" style="margin-left:4px;" onclick="deleteUser(${u.id})">Delete</button>` : ''}
                ${u.id === currentUser.id ? `<span style="font-size:11px;color:#94a3b8;margin-left:8px;">(you)</span>` : ''}
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="card" style="margin-top:16px;background:#fffbeb;border:1px solid #fde68a;">
      <p style="font-size:13px;color:#92400e;margin:0;line-height:1.6;">
        <strong>Roles:</strong>&nbsp;
        <strong>Admin</strong> — full access including user management &nbsp;·&nbsp;
        <strong>Accountant</strong> — can add and edit all records, cannot delete or manage users &nbsp;·&nbsp;
        <strong>Viewer</strong> — read-only access<br>
        <strong>Note:</strong> Passwords are stored locally and are not encrypted. Do not reuse sensitive passwords.
      </p>
    </div>`;
}

function showAddUser(prefill) {
  if (!isAdmin()) return alert('Only administrators can manage users.');
  const u = prefill || {};
  openModal(`
    <div class="modal-overlay" onclick="overlayClick(event)">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">${u.id ? 'Edit User' : 'New User'}</div>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="u-name" value="${escHtml(u.name||'')}" placeholder="Jane Smith">
            </div>
            <div class="form-group">
              <label>Username</label>
              <input type="text" id="u-username" value="${escHtml(u.username||'')}" placeholder="jsmith" autocomplete="off">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>${u.id ? 'New Password' : 'Password'} ${u.id ? '<span style="font-weight:400;color:#94a3b8;text-transform:none">(leave blank to keep)</span>' : ''}</label>
              <input type="password" id="u-pass" placeholder="${u.id ? 'Leave blank to keep current' : 'Set a password'}" autocomplete="new-password">
            </div>
            <div class="form-group">
              <label>Role</label>
              <select id="u-role">
                <option value="admin"      ${(u.role||'accountant')==='admin'?'selected':''}>Admin — full access</option>
                <option value="accountant" ${(u.role||'accountant')==='accountant'?'selected':''}>Accountant — add & edit, no deletes</option>
                <option value="viewer"     ${u.role==='viewer'?'selected':''}>Viewer — read-only</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="saveUser(${u.id||0})">${u.id ? 'Save Changes' : 'Create User'}</button>
        </div>
      </div>
    </div>`);
  document.getElementById('u-name').focus();
}

function showEditUser(id) {
  const u = loadUsers().find(x => x.id === id); if (u) showAddUser(u);
}

function saveUser(id) {
  if (!isAdmin()) return alert('Only administrators can manage users.');
  const name     = document.getElementById('u-name').value.trim();
  const username = document.getElementById('u-username').value.trim();
  const password = document.getElementById('u-pass').value;
  const role     = document.getElementById('u-role').value;
  if (!name)     return alert('Please enter a full name.');
  if (!username) return alert('Please enter a username.');
  const users = loadUsers();
  const dupe = users.find(u => u.username === username && u.id !== id);
  if (dupe) return alert(`Username "${username}" is already taken.`);
  if (id) {
    const u = users.find(x => x.id === id); if (!u) return;
    u.name = name; u.username = username; u.role = role;
    if (password) u.password = password;
    // Keep current session in sync if editing self
    if (currentUser.id === id) { currentUser = u; setUserUI(u); sessionStorage.setItem(CC_SESSION_KEY, JSON.stringify({ id: u.id, username: u.username })); }
  } else {
    if (!password) return alert('Please set a password for the new user.');
    users.push({ id: Math.max(0, ...users.map(u => u.id)) + 1, name, username, password, role, created: todayStr() });
  }
  saveUsers(users); closeModal(); renderUsers();
}

function deleteUser(id) {
  if (!isAdmin()) return alert('Only administrators can manage users.');
  if (id === currentUser.id) return alert('You cannot delete your own account.');
  const u = loadUsers().find(x => x.id === id); if (!u) return;
  if (!confirm(`Delete user "${u.name}"? This cannot be undone.`)) return;
  saveUsers(loadUsers().filter(x => x.id !== id));
  renderUsers();
}

// ══════════════════════════════════════════════════════════
// APP INIT
// ══════════════════════════════════════════════════════════

if (localStorage.getItem('cc_sidebar_collapsed') === '1') {
  document.getElementById('sidebar').classList.add('collapsed');
}

ensureDefaultAdmin();

(function initSession() {
  const raw = sessionStorage.getItem(CC_SESSION_KEY);
  if (!raw) return; // show login screen (already visible by default)
  try {
    const stub  = JSON.parse(raw);
    const users = loadUsers();
    const valid = users.find(u => u.id === stub.id && u.username === stub.username);
    if (!valid) return;
    currentUser = valid;
    setUserUI(valid);
    document.getElementById('login-screen').style.display = 'none';
    loadDB().then(() => {
      updateSyncBadge();
      checkAndRunRecurring();
      renderDashboard();
      if (_cloudMode) startCloudPolling();
    });
  } catch { /* invalid session, stay on login */ }
})();
</script>
