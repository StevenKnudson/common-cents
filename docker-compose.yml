services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - DATA_DIR=/app/data
    volumes:
      - app-data:/app/data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  app-data:
