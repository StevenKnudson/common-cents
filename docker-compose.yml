services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - DATA_DIR=/app/data
    volumes:
      - app-data:/app/data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt
    depends_on:
      - app
    entrypoint: /bin/sh -c 'if [ ! -f /etc/letsencrypt/live/app/fullchain.pem ]; then mkdir -p /etc/letsencrypt/live/app && openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /etc/letsencrypt/live/app/privkey.pem -out /etc/letsencrypt/live/app/fullchain.pem -subj "/CN=localhost"; fi && nginx -g "daemon off;"'

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"

volumes:
  app-data:
  certbot-webroot:
  certbot-certs:
